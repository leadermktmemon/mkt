name = "mkt"
main = "cf-worker/src/index.js"
compatibility_date = "2024-01-01"
workers_dev = false

# Serve dashboard static files (data.js, index.html, thumbs/, ...)
[assets]
directory = "marketing-report/dashboard"

# Cron trigger: goi GitHub Actions workflow_dispatch moi 30 phut
[triggers]
crons = ["*/30 * * * *"]

[vars]
GITHUB_REPO = "leadermktmemon/mkt"
# GITHUB_TOKEN: secret, set qua Cloudflare dashboard hoac: npx wrangler secret put GITHUB_TOKEN
