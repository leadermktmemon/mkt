name: Daily Marketing Report

on:
  schedule:
    - cron: "0 1,4,7,10,13 * * *"   # ~3 tiếng/lần trong giờ làm VN (08,11,14,17,20h)
  workflow_dispatch:        # cho phép bấm chạy tay

permissions:
  contents: write           # để commit dashboard/data.js

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Tạo file cấu hình từ Secrets
        env:
          NHANH_CONFIG: ${{ secrets.NHANH_CONFIG }}
          LARK_CONFIG: ${{ secrets.LARK_CONFIG }}
        run: |
          printf '%s' "$NHANH_CONFIG" > nhanh.config.json
          printf '%s' "$LARK_CONFIG" > marketing-report/config.json

      - name: Tổng hợp dữ liệu nhanh.vn (tới 365 ngày)
        run: node marketing-report/dashboard/build-data.mjs 365

      - name: Gửi thẻ KPI vào Lark (chỉ buổi sáng ~08h VN)
        run: |
          if [ "$(date -u +%H)" = "01" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node marketing-report/send-lark.mjs
          else
            echo "Bỏ qua gửi Lark (không phải khung 08h)"
          fi

      - name: Commit dữ liệu dashboard (để Cloudflare deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing-report/dashboard/data.js marketing-report/dashboard/data.json
          git commit -m "chore: cap nhat du lieu dashboard" || echo "Không có thay đổi"
          git push
