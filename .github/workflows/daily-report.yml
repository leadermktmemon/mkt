name: Daily Marketing Report

on:
  schedule:
    - cron: "*/30 * * * *"  # fallback (GitHub throttle nặng — dùng Cloudflare Worker bên ngoài là chính)
    - cron: "0 1 * * *"      # 08h VN (01:00 UTC): kéo Meta Ads mỗi ngày
    - cron: "0 2 * * *"      # 09h VN (02:00 UTC): gửi báo cáo Lark
  workflow_dispatch:         # chạy tay hoặc trigger từ Cloudflare Worker (cf-worker/)

permissions:
  contents: write           # để commit dashboard/data.js

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Tạo file cấu hình từ Secrets
        env:
          NHANH_CONFIG: ${{ secrets.NHANH_CONFIG }}
          LARK_CONFIG: ${{ secrets.LARK_CONFIG }}
          LARK_BASE_CONFIG: ${{ secrets.LARK_BASE_CONFIG }}
          META_CONFIG: ${{ secrets.META_CONFIG }}
          GOOGLE_CONFIG: ${{ secrets.GOOGLE_CONFIG }}
        run: |
          printf '%s' "$LARK_BASE_CONFIG" > lark.config.json
          printf '%s' "$LARK_CONFIG" > marketing-report/config.json
          printf '%s' "$NHANH_CONFIG" > nhanh.config.json
          if [ -n "$META_CONFIG" ]; then
            printf '%s' "$META_CONFIG" > meta.config.json
            echo "Meta config: đã tạo"
          else
            echo "Meta config: chưa có secret META_CONFIG, bỏ qua ads"
          fi
          if [ -n "$GOOGLE_CONFIG" ]; then
            printf '%s' "$GOOGLE_CONFIG" > google.config.json
            echo "Google Ads config: đã tạo"
          else
            echo "Google Ads config: chưa có secret GOOGLE_CONFIG, bỏ qua"
          fi

      - name: Kéo chi phí Meta Ads (08h VN = cron 01:00 UTC, hoặc chạy tay)
        run: |
          if [ -f meta.config.json ]; then
            SCHEDULE="${{ github.event.schedule }}"
            # Chỉ chạy khi đúng cron 01:00 UTC hoặc bấm tay — KHÔNG chạy mỗi 30 phút
            if [ "$SCHEDULE" = "0 1 * * *" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Kéo Meta Ads (trigger: ${SCHEDULE:-workflow_dispatch})..."
              node meta-fetch.mjs
            else
              echo "Bỏ qua Meta fetch (trigger: ${SCHEDULE:-unknown})"
            fi
          else
            echo "Bỏ qua Meta fetch (chưa có meta.config.json)"
          fi

      - name: Kéo chi phí Google Ads (08h VN = cron 01:00 UTC, hoặc chạy tay)
        run: |
          if [ -f google.config.json ]; then
            SCHEDULE="${{ github.event.schedule }}"
            if [ "$SCHEDULE" = "0 1 * * *" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Kéo Google Ads (trigger: ${SCHEDULE:-workflow_dispatch})..."
              node google-ads-fetch.mjs
            else
              echo "Bỏ qua Google Ads fetch (trigger: ${SCHEDULE:-unknown})"
            fi
          else
            echo "Bỏ qua Google Ads fetch (chưa có google.config.json)"
          fi

      - name: Tổng hợp dữ liệu từ Base Lark (Sales Online + Cửa hàng)
        run: node marketing-report/dashboard/lark-build-data.mjs

      - name: Screenshot dashboard (để gửi kèm vào Lark)
        continue-on-error: true
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          if [ "$SCHEDULE" = "0 2 * * *" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cd marketing-report/dashboard
            python3 -m http.server 8080 &
            SERVER_PID=$!
            sleep 5
            CHROME=$(which google-chrome-stable 2>/dev/null || which google-chrome 2>/dev/null || which chromium-browser 2>/dev/null || which chromium 2>/dev/null)
            if [ -n "$CHROME" ]; then
              "$CHROME" --headless --no-sandbox --disable-gpu \
                --run-all-compositor-stages-before-draw \
                --virtual-time-budget=3000 \
                --screenshot=/tmp/dashboard.png \
                --window-size=1440,900 \
                http://localhost:8080
              ls -la /tmp/dashboard.png && echo "Screenshot OK" || echo "Screenshot thất bại"
            else
              echo "Không tìm thấy Chrome/Chromium, bỏ qua screenshot"
            fi
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Gửi thẻ KPI vào Lark (09h VN = cron 02:00 UTC — CHỈ 1 lần/ngày)
        continue-on-error: true
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          # Chi gui khi dung cron 02:00 UTC (09h VN). Cloudflare Worker dung workflow_dispatch -> KHONG gui.
          if [ "$SCHEDULE" = "0 2 * * *" ]; then
            echo "Gửi báo cáo Lark (09h VN)..."
            node marketing-report/send-lark.mjs
          else
            echo "Bỏ qua gửi Lark (trigger: ${SCHEDULE:-workflow_dispatch} — chỉ gửi đúng 09h VN)"
          fi

      - name: Commit dữ liệu dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch latest rồi reset HEAD về origin/main, giữ nguyên working tree (data.js vừa build)
          # Tránh conflict khi có commit thủ công lên main song song với cron
          git fetch origin main
          git reset --soft origin/main
          git add marketing-report/dashboard/data.js marketing-report/dashboard/data.json marketing-report/dashboard/thumbs
          # meta-data.json, google-ads-data.json: commit khi co (chi co sau khi fetch chay luc 08h VN)
          git add marketing-report/dashboard/meta-data.json 2>/dev/null || true
          git add marketing-report/dashboard/google-ads-data.json 2>/dev/null || true
          git diff --cached --quiet && echo "Không có thay đổi, bỏ qua push" && exit 0
          git commit -m "chore: cap nhat du lieu dashboard"
          git push

      - name: Deploy Cloudflare Worker (dashboard + data mới nhất lên live)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "34339de1274b70be28a237cf92d78d65"
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Deploy Cloudflare Worker..."
            cd cf-worker
            npx wrangler deploy
          else
            echo "Bỏ qua deploy Cloudflare (chưa có secret CLOUDFLARE_API_TOKEN)"
          fi
