<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memon · Dashboard</title>
<style>
  :root{--bg:#eef1f5;--card:#fff;--ink:#111827;--muted:#6b7280;--muted2:#9ca3af;--line:#e5e7eb;--brand:#15A9D6;--brand-dark:#0E8AB4;--brand-soft:#edf8fc;--pink:#F2709E;--pink-soft:#fdeef4;--blue:#15A9D6;--teal:#1D9E75;--amber:#BA7517;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 20px 48px;}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .logoimg{height:48px;width:auto;display:block;}
  .logoMark{font-size:28px;font-weight:800;color:var(--brand);letter-spacing:-1px;font-family:"Segoe UI Rounded","Nunito","Segoe UI",-apple-system,sans-serif;line-height:1;}
  .logoMark sup{font-size:11px;top:-0.9em;}
  .brandtext h1{font-size:16px;margin:0;font-weight:700;color:var(--ink);}
  .tagline{font-size:11px;color:var(--pink);font-weight:600;margin-top:2px;letter-spacing:.2px;}
  .sub{font-size:12px;color:var(--muted);}
  .brandbar{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--brand) 0%,var(--pink) 100%);margin:0 0 20px;}
  /* Controls */
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:20px;}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{border:0;background:transparent;padding:7px 13px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:background .12s,color .12s;}
  .seg button.on{background:var(--brand);color:#fff;font-weight:700;}
  .seg button:hover:not(.on){background:var(--brand-soft);color:var(--brand-dark);}
  .seg .lbl{padding:7px 9px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);border-right:1px solid var(--line);align-self:center;}
  .ctl{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px 10px;}
  .ctl .lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);}
  select,input[type=date]{font-family:inherit;font-size:13px;padding:5px 4px;border:0;background:transparent;color:var(--ink);cursor:pointer;font-weight:600;}
  input[type=date]{border:1px solid var(--line);border-radius:7px;background:var(--card);padding:5px 8px;}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .kpi.accent{border-color:var(--blue);border-width:2px;}
  .kpi .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
  .kpi .val{font-size:24px;font-weight:700;letter-spacing:-.5px;}
  /* Metric cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:12px;margin-bottom:20px;}
  .ccard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .ctitle{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px;}
  .cmain{font-size:28px;font-weight:800;letter-spacing:-.8px;line-height:1.2;margin:0 0 2px;}
  .csub{font-size:12px;color:var(--muted);font-weight:500;margin:0 0 10px;line-height:1.4;}
  .cmetrics{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);}
  .cm{display:flex;justify-content:space-between;gap:6px;font-size:12px;padding:5px 0;border-top:1px solid var(--line);}
  .cm:nth-child(-n+2){border-top:none;}
  .cm span{color:var(--muted);}
  .cm b{font-weight:600;}
  .cm b.mut{color:var(--muted2);font-weight:400;font-style:italic;}
  /* Layout */
  .grid2{display:grid;grid-template-columns:1.2fr 0.8fr;gap:14px;margin-bottom:14px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.03);}
  .panel h2{font-size:13.5px;font-weight:700;margin:0 0 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--ink);}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--muted);}
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:8px;height:8px;border-radius:2px;display:inline-block;}
  .cw{position:relative;width:100%;}
  /* Table */
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{text-align:right;padding:9px 8px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  th{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:#f9fafb;border-bottom:2px solid var(--line);padding:10px 8px;}
  tbody tr:hover{background:#f0f9fc;}
  td.name{display:flex;align-items:center;gap:8px;}
  .note{font-size:12px;color:var(--muted);padding:6px 0;line-height:1.5;}
  td.mut,span.mut{color:var(--muted);}
  footer{margin-top:28px;font-size:12px;color:var(--muted);text-align:center;padding-top:16px;border-top:1px solid var(--line);}
  @media(max-width:760px){.grid2{grid-template-columns:1fr;}.cards{grid-template-columns:1fr;}}
  /* Growth badges — nhỏ gọn hơn */
  .cgrow{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:5px;margin-left:5px;vertical-align:middle;}
  .cgrow.up{background:#dcfce7;color:#15803d;}
  .cgrow.dn{background:#fee2e2;color:#dc2626;}
  .cgrow.nt{background:#f3f4f6;color:#6b7280;}
  .cgrow.yoy{background:#fef9c3;color:#92400e;font-size:9.5px;opacity:.8;}
  .cgrow.yoy.dn{background:#fce7f3;color:#9d174d;}
  .cgrow.yoy.nt{background:#f3f4f6;color:#6b7280;}
  /* Modal phong to chien dich */
  #campModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;align-items:center;justify-content:center;padding:16px;}
  #campModal.open{display:flex;}
  .mbox{background:var(--card);border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.25);}
  .mimg{width:100%;border-radius:16px 16px 0 0;max-height:320px;object-fit:contain;display:block;background:#111;}
  .mnoi{width:100%;height:120px;border-radius:16px 16px 0 0;background:#eef1f5;display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:12px;}
  .mcarousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;border-radius:16px 16px 0 0;background:#111;scrollbar-width:none;gap:3px;}
  .mcarousel::-webkit-scrollbar{display:none;}
  .mcarousel img{flex:0 0 calc(100% - 3px);max-height:320px;object-fit:contain;scroll-snap-align:start;display:block;background:#111;}
  .mcar-info{text-align:center;padding:6px 12px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--line);}
  .mbody{padding:20px 22px 24px;}
  .mclose{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);color:#fff;border:0;font-size:20px;line-height:28px;cursor:pointer;text-align:center;z-index:1;}
  .mclose:hover{background:rgba(0,0,0,.65);}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:10px;overflow:hidden;margin:14px 0;}
  .mcell{background:var(--card);padding:10px 14px;}
  .mcell .ml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;}
  .mcell .mv{font-size:16px;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="logo.png" alt="Memon" class="logoimg" onerror="this.outerHTML='<span class=\'logoMark\'>Memon<sup>®</sup></span>'">
      <div class="brandtext">
        <h1>Marketing Report</h1>
        <div class="tagline">Trao cảm xúc · Gửi yêu thương 🧸</div>
      </div>
    </div>
    <div class="sub" id="sub"></div>
  </header>
  <div class="brandbar"></div>

  <div class="controls">
    <div class="seg" id="segGroup">
      <span class="lbl">Nhóm</span>
      <button data-grp="1" class="on">1 · Doanh Số</button>
      <button data-grp="2">2 · Campaign</button>
      <button data-grp="3">3 · Theo kênh</button>
    </div>
    <div class="ctl">
      <span class="lbl">Kỳ</span>
      <select id="periodSel">
        <option value="today">Hôm nay</option>
        <option value="thisweek">Tuần này</option>
        <option value="lastweek">Tuần trước</option>
        <option value="7">7 ngày qua</option>
        <option value="30" selected>30 ngày qua</option>
        <option value="month">Tháng này</option>
        <option value="90">90 ngày qua</option>
        <option value="365">1 năm qua</option>
        <option value="custom">Chọn ngày…</option>
      </select>
      <span id="customRange" style="display:none;align-items:center;gap:6px;">
        <input type="date" id="dFrom"> <span style="color:var(--muted);">→</span> <input type="date" id="dTo">
      </span>
    </div>
    <div class="seg" id="segGran">
      <span class="lbl">Gộp</span>
      <button data-g="day" class="on">Ngày</button>
      <button data-g="week">Tuần</button>
      <button data-g="month">Tháng</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="panel" id="trendPanel" style="margin-bottom:16px;">
    <h2><span id="trendTitle">Xu hướng doanh thu</span><span id="granLabel" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div class="legend" id="legTrend"></div>
    <div class="cw" style="height:300px;"><canvas id="cTrend"></canvas></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2 id="bdTitle">Theo nguồn / kênh</h2>
      <table id="bdTable"><thead></thead><tbody></tbody></table>
      <div class="note" id="bdNote" style="display:none;"></div>
    </div>
    <div class="panel">
      <h2 id="mixTitle">Cơ cấu</h2>
      <div class="legend" id="legMix"></div>
      <div class="cw" style="height:230px;"><canvas id="cMix"></canvas></div>
    </div>
  </div>

  <div class="panel" id="storePanel">
    <h2>Doanh thu theo cửa hàng <span style="font-size:12px;color:var(--muted);font-weight:400;">(bán lẻ tại quầy)</span></h2>
    <div class="cw" id="storeWrap" style="height:420px;"><canvas id="cStore"></canvas></div>
  </div>

  <div class="panel" id="campaignPanel" style="display:none;margin-bottom:16px;">
    <h2 style="display:flex;justify-content:space-between;align-items:center;">Chiến dịch Facebook <span id="campPeriod" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <select id="campStatusFilter" style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
        <option value="">Tất cả trạng thái</option>
        <option value="ACTIVE">Đang chạy (ACTIVE)</option>
        <option value="PAUSED">Đã dừng (PAUSED)</option>
        <option value="ARCHIVED">Đã lưu trữ</option>
      </select>
      <select id="campEffFilter" style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
        <option value="">Tất cả hiệu quả</option>
        <option value="good">🟢 Tốt</option>
        <option value="ok">🟡 Khá</option>
        <option value="poor">🔴 Kém / Đắt</option>
        <option value="none">⚪ Chưa đo</option>
      </select>
      <input type="text" id="campSearch" placeholder="🔍 Tìm tên chiến dịch..." style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);min-width:190px;outline:none;" onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--line)'">
      <span id="campSummary" style="font-size:13px;color:var(--muted);"></span>
    </div>
    <div id="campBody"></div>
    <div class="note" id="campNote" style="margin-top:10px;"></div>
  </div>

  <footer id="foot"></footer>
</div>

<div id="campModal" onclick="if(event.target===this)closeCampModal()">
  <div class="mbox">
    <button class="mclose" onclick="closeCampModal()">×</button>
    <div id="mImgArea"></div>
    <div class="mbody" id="mBody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<script>
(function(){
  var D=window.DASHBOARD_DATA; if(!D||!D.daily){document.getElementById('sub').textContent='Không tìm thấy data.js';return;}
  var PALETTE={'FB Bemori':'#378ADD','Facebook':'#378ADD','Zalo Bemori':'#1D9E75','Zalo cá nhân':'#1D9E75','Admin':'#888780','Khách lẻ':'#888780','Shopee':'#D85A30','Instagram':'#D4537E','Insta Bemori':'#D4537E','Zalo OA':'#BA7517','Website':'#7F77DD','Web Bemori':'#7F77DD'};
  var FB=['#378ADD','#1D9E75','#D85A30','#D4537E','#BA7517','#7F77DD','#888780','#26215C','#0F6E56','#993C1D'];
  var colorOf=function(n,i){return PALETTE[n]||FB[i%FB.length];};
  function vnd(n){n=Math.round(n); if(n>=1e9)return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+' tỷ'; if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' tr'; if(n>=1e3)return Math.round(n/1e3)+'K'; return String(n);}
  var full=function(n){return Math.round(n).toLocaleString('vi-VN')+'đ';};
  Chart.defaults.color='#6b7280'; Chart.defaults.font.family='inherit'; var grid='rgba(0,0,0,0.06)';
  var COL={'Bemori':'#378ADD','Memon':'#7F77DD','Online':'#378ADD','Cửa hàng':'#1D9E75','Teddy':'#D4537E','Khác':'#888780','GBO/NNGB':'#BA7517','Facebook':'#378ADD','Instagram':'#D4537E','Zalo':'#1D9E75','Website':'#7F77DD','Bán lẻ NK':'#888780','Ads':'#D85A30','Tự nhiên / Viral':'#1D9E75'};
  var COST='— (chờ ads)';

  var group='1', period='30', gran='day', cFrom=null, cTo=null, charts={};
  var campSort={brand:{col:'spend',dir:1},conv:{col:'spend',dir:1}};
  window.sortCamp=function(type,col){if(campSort[type].col===col)campSort[type].dir*=-1;else{campSort[type].col=col;campSort[type].dir=1;}render();};

  // ---- URL hash state (F5 / chia se link giu nguyen bo loc) ----
  function pushURL(){var p=new URLSearchParams();p.set('g',group);p.set('p',period);p.set('gr',gran);if(period==='custom'){if(cFrom)p.set('f',cFrom);if(cTo)p.set('t',cTo);}var sf=document.getElementById('campStatusFilter').value,ef=document.getElementById('campEffFilter').value,sq=document.getElementById('campSearch').value;if(sf)p.set('sf',sf);if(ef)p.set('ef',ef);if(sq)p.set('sq',sq);history.replaceState(null,'','#'+p.toString());}
  function loadURL(){if(!location.hash)return;var p=new URLSearchParams(location.hash.slice(1));if(p.get('g'))group=p.get('g');if(p.get('p')){period=p.get('p');document.getElementById('periodSel').value=period;}if(p.get('gr'))gran=p.get('gr');if(p.get('f')){cFrom=p.get('f');document.getElementById('dFrom').value=cFrom;}if(p.get('t')){cTo=p.get('t');document.getElementById('dTo').value=cTo;}if(period==='custom')document.getElementById('customRange').style.display='inline-flex';document.querySelectorAll('#segGroup button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-grp')===group);});document.querySelectorAll('#segGran button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-g')===gran);});var sf=p.get('sf'),ef=p.get('ef'),sq=p.get('sq');if(sf)document.getElementById('campStatusFilter').value=sf;if(ef)document.getElementById('campEffFilter').value=ef;if(sq)document.getElementById('campSearch').value=sq;}

  function sliceFor(p){ var d=D.daily; if(!d.length)return [];
    if(p==='7')return d.slice(-7); if(p==='30')return d.slice(-30);
    if(p==='90')return d.slice(-90); if(p==='365')return d.slice(-365);
    if(p==='today'){var t=new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);return d.filter(function(x){return x.day===t;});}
    if(p==='thisweek'){var nw=new Date(Date.now()+7*3600*1000);var dw=nw.getUTCDay();var off=dw===0?6:dw-1;var mon=new Date(nw.getTime()-off*86400000).toISOString().slice(0,10);var tod=nw.toISOString().slice(0,10);return d.filter(function(x){return x.day>=mon&&x.day<=tod;});}
    if(p==='lastweek'){var nw2=new Date(Date.now()+7*3600*1000);var dw2=nw2.getUTCDay();var off2=dw2===0?6:dw2-1;var thisMon=new Date(nw2.getTime()-off2*86400000);var lMon=new Date(thisMon.getTime()-7*86400000).toISOString().slice(0,10);var lSun=new Date(thisMon.getTime()-86400000).toISOString().slice(0,10);return d.filter(function(x){return x.day>=lMon&&x.day<=lSun;});}
    if(p==='month'){var m=d[d.length-1].day.slice(0,7);return d.filter(function(x){return x.day.slice(0,7)===m;});}
    if(p==='custom')return d.filter(function(x){return (!cFrom||x.day>=cFrom)&&(!cTo||x.day<=cTo);});
    return d; }

  function detectProduct(n){n=(n||'').toLowerCase();if(/bemori/.test(n))return'Bemori';if(/teddy|kid/.test(n))return'Teddy';if(/gbo|gấu bông|nngb|ngôi nhà/.test(n))return'GBO/NNGB';if(/memon/.test(n))return'Memon';return'Khác';}
  function prevSliceFor(p){var cur=sliceFor(p);if(!cur.length)return [];var d=D.daily;var first=cur[0].day;var fi=d.findIndex(function(x){return x.day===first;});var n=cur.length;if(fi<n)return [];return d.slice(fi-n,fi);}
  function growBadge(curr,prev){if(!prev)return '';var p=Math.round((curr-prev)/prev*100);if(p>0)return '<span class="cgrow up">+'+p+'%</span>';if(p<0)return '<span class="cgrow dn">'+p+'%</span>';return '<span class="cgrow nt">0%</span>';}
  function yoySliceFor(p){var cur=sliceFor(p);if(!cur.length)return [];var d=D.daily;var ms=365*86400000;var f=new Date(cur[0].day+'T00:00:00Z').getTime()-ms;var l=new Date(cur[cur.length-1].day+'T00:00:00Z').getTime()-ms;var fs=new Date(f).toISOString().slice(0,10),ls=new Date(l).toISOString().slice(0,10);return d.filter(function(x){return x.day>=fs&&x.day<=ls;});}
  function yoyBadge(curr,yoy){if(!yoy)return '';var p=Math.round((curr-yoy)/yoy*100);if(p>0)return '<span class="cgrow yoy">+'+p+'% YoY</span>';if(p<0)return '<span class="cgrow yoy dn">'+p+'% YoY</span>';return '<span class="cgrow yoy nt">0% YoY</span>';}

  function sumOnline(s){var r=0;s.forEach(function(d){r+=d.onlineRev||0;});return r;}
  function sumStore(s){var r=0;s.forEach(function(d){r+=d.storeRev||0;});return r;}
  function sumStoreOnline(s){var r=0;s.forEach(function(d){r+=d.storeOnline||0;});return r;}
  function sumF(s,k){var r=0;s.forEach(function(d){r+=d[k]||0;});return r;}
  function sumMemon(s){var r=0;s.forEach(function(d){r+=d.memonRev||0;});return r;}
  // Online: doanh thu tong + so don lay tu bang 2.2 (chinh xac, ko tre). Ty trong kenh lay tu 3.1.
  // So don/AOV theo kenh = UOC LUONG theo ty trong doanh thu (Base khong nhap so don theo kenh).
  function onlineAgg(s){var chRaw={},total=0,orders=0;s.forEach(function(d){total+=d.onlineRev||0;orders+=d.onlineOrders||0;for(var k in d.online){chRaw[k]=(chRaw[k]||0)+d.online[k].rev;}});
    var sumCh=0;for(var k in chRaw)sumCh+=chRaw[k];if(!sumCh)sumCh=1;
    var list=Object.keys(chRaw).sort(function(a,b){return chRaw[b]-chRaw[a];}).map(function(n){var share=chRaw[n]/sumCh;var rev=total*share;var ord=Math.round(orders*share);return {name:n,orders:ord,revenue:rev,aov:ord?Math.round(rev/ord):0,share:Math.round(share*100)};});

      var bn=document.getElementById('bdNote');bn.textContent=bdNote;bn.style.display=bdNote?'block':'none';
      document.getElementById('legMix').innerHTML=leg;
      drawDonut('cMix',mixL,mixV,mixC);
    }
  }

  function drawDonut(id,labels,vals,colors){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+': '+full(c.parsed);}}}}}});}
  function drawBar(id,labels,vals,color){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{data:vals,backgroundColor:color,borderRadius:4,barThickness:20}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return full(c.parsed.x);}}}},scales:{x:{grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}},y:{grid:{display:false}}}}});}
  function drawStacked(id,labels,series){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:series},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+full(c.parsed.y);}}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}}}}});}

  function bindSeg(id,attr,setter){document.getElementById(id).addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;this.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');setter(b.getAttribute(attr));render();});}
  bindSeg('segGroup','data-grp',function(v){group=v;});
  bindSeg('segGran','data-g',function(v){gran=v;});
  var fromI=document.getElementById('dFrom'),toI=document.getElementById('dTo'),cr=document.getElementById('customRange');
  var minD=D.daily[0]?D.daily[0].day:'',maxD=D.daily.length?D.daily[D.daily.length-1].day:'';
  [fromI,toI].forEach(function(i){i.min=minD;i.max=maxD;});
  fromI.value=D.daily.length>30?D.daily[D.daily.length-30].day:minD;toI.value=maxD;cFrom=fromI.value;cTo=toI.value;
  document.getElementById('periodSel').addEventListener('change',function(){period=this.value;cr.style.display=period==='custom'?'inline-flex':'none';render();});
  fromI.addEventListener('change',function(){cFrom=this.value;if(period==='custom')render();});
  toI.addEventListener('change',function(){cTo=this.value;if(period==='custom')render();});
  document.getElementById('campStatusFilter').addEventListener('change',function(){render();});
  document.getElementById('campEffFilter').addEventListener('change',function(){render();});
  document.getElementById('campSearch').addEventListener('input',function(){render();});
  window.setCampEff=function(v){document.getElementById('campEffFilter').value=v;render();};
  function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  window.showCampModal=function(id){
    var c=window._camps&&window._camps[id];if(!c)return;
    var cr=c.creative||{};
    // Uu tien: carousel CDN > anh cao res CDN > thumbnail local
    var imgs=cr.images&&cr.images.length>0?cr.images:(cr.imageUrl?[cr.imageUrl]:(c.thumb?[c.thumb]:[]));
    var imgArea=document.getElementById('mImgArea');
    if(!imgs.length){
      imgArea.innerHTML='<div class="mnoi">Không có ảnh</div>';
    }else if(imgs.length===1){
      var el=document.createElement('img');el.className='mimg';el.alt='';el.src=imgs[0];
      el.onerror=function(){imgArea.innerHTML='<div class="mnoi">Không có ảnh</div>';};
      imgArea.innerHTML='';imgArea.appendChild(el);
    }else{
      var ch='<div class="mcarousel">';
      imgs.forEach(function(src){ch+='<img src="'+escHtml(src)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';});
      ch+='</div><div class="mcar-info">'+imgs.length+' ảnh carousel · vuốt ngang để xem</div>';
      imgArea.innerHTML=ch;
    }
    var isBrand=c.type==='brand';
    var SLtxt={'ACTIVE':'<span style="color:#15803d;font-weight:600">● Đang chạy</span>','PAUSED':'<span style="color:#aaa">⏸ Đã dừng</span>','ARCHIVED':'<span style="color:#dc2626">✕ Lưu trữ</span>'};
    var effHtml=(function(){
      var st='font-size:12px;padding:3px 10px;border-radius:5px;font-weight:600;';
      if(c.eff==='good')return '<span style="'+st+'background:#dcfce7;color:#15803d">Tốt</span>';
      if(c.eff==='ok')return '<span style="'+st+'background:#fef9c3;color:#a16207">Khá</span>';
      if(c.eff==='poor')return '<span style="'+st+'background:#fee2e2;color:#dc2626">'+(isBrand?'Đắt':'Kém')+'</span>';
      return '<span style="font-size:12px;color:var(--muted2)">Chưa đo</span>';
    })();
    var typeTag=isBrand?'<span style="font-size:12px;padding:3px 10px;border-radius:5px;background:#e6f1fb;color:#185fa5;font-weight:600">📣 Branding</span>':'<span style="font-size:12px;padding:3px 10px;border-radius:5px;background:#e1f5ee;color:#0f6e56;font-weight:600">🎯 Doanh số</span>';
    var cells=isBrand?[
      ['Chi phí',vnd(c.spend)],['Hiển thị',c.impressions?Math.round(c.impressions/1000)+'K':'—'],
      ['CPM',c.cpm?vnd(c.cpm):'—'],['Tương tác',c.engagement?c.engagement.toLocaleString('vi-VN'):'—'],
      ['CPE',c.cpe?vnd(c.cpe):'—']
    ]:[
      ['Chi phí',vnd(c.spend)],['Hiển thị',c.impressions?Math.round(c.impressions/1000)+'K':'—'],
      ['Tin nhắn',c.messages||'—'],['Lead',c.leads||'—'],
      ['Đơn mua',c.purchases||'—'],['DT pixel',c.purchaseValue?vnd(c.purchaseValue):'—'],
      ['CPO',c.cpo?vnd(c.cpo):'—'],['ROAS FB Ads',c.roas?c.roas.toFixed(1)+'x':'—']
    ];
    var b='';
    b+='<div style="font-size:16px;font-weight:800;line-height:1.35;margin-bottom:5px">'+c.name+'</div>';
    b+='<div style="font-size:12px;color:var(--muted);margin-bottom:12px">'+c.account+' · '+(SLtxt[c.status]||c.status)+'</div>';
    b+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px">'+typeTag+' '+effHtml+'</div>';
    b+='<div class="mgrid">';
    cells.forEach(function(cl){b+='<div class="mcell"><div class="ml">'+cl[0]+'</div><div class="mv">'+cl[1]+'</div></div>';});
    b+='</div>';
    b+='<a href="https://adsmanager.facebook.com/adsmanager/manage/campaigns?selected_campaign_ids='+c.id+'" target="_blank" rel="noopener" style="font-size:13px;color:var(--brand);font-weight:600;text-decoration:none">Xem chiến dịch trên Meta Ads Manager →</a>';
    if(cr.title||cr.body){
      b+='<div style="border-top:1px solid var(--line);margin-top:16px;padding-top:16px">';
      b+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">Nội dung quảng cáo</div>';
      if(cr.title)b+='<div style="font-size:14px;font-weight:700;line-height:1.4;margin-bottom:8px">'+escHtml(cr.title)+'</div>';
      if(cr.body)b+='<div style="font-size:13px;line-height:1.7;color:var(--ink);white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:12px">'+escHtml(cr.body)+'</div>';
      if(cr.cta){var ctaMap={MESSAGE_PAGE:'Nhắn tin',SHOP_NOW:'Mua ngay',LEARN_MORE:'Tìm hiểu thêm',SIGN_UP:'Đăng ký',CONTACT_US:'Liên hệ',SUBSCRIBE:'Đăng ký nhận tin',BOOK_NOW:'Đặt ngay',DOWNLOAD:'Tải về',GET_OFFER:'Nhận ưu đãi',WATCH_VIDEO:'Xem video',APPLY_NOW:'Đăng ký ngay',GET_QUOTE:'Nhận báo giá',CALL_NOW:'Gọi ngay',ORDER_NOW:'Đặt hàng ngay',NO_BUTTON:'(không có nút)'};b+='<div style="display:inline-block;margin-top:10px;padding:6px 14px;border-radius:7px;background:var(--brand);color:#fff;font-size:12px;font-weight:700">'+(ctaMap[cr.cta]||cr.cta)+'</div>';}
      b+='</div>';
    }
    document.getElementById('mBody').innerHTML=b;
    document.getElementById('campModal').classList.add('open');
    document.body.style.overflow='hidden';
  };
  window.closeCampModal=function(){document.getElementById('campModal').classList.remove('open');document.body.style.overflow='';};
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeCampModal();});

  function fmtD(d){return d.split('-').reverse().join('/');}
  function rangeLabel(){var s=sliceFor(period);
    if(!s.length){if(period==='today'){var t=new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);if(D.daily.length){var ld=D.daily[D.daily.length-1].day;if(ld<t)return fmtD(t)+' · dữ liệu '+fmtD(ld)+' (mới nhất)';}return fmtD(t)+' · chưa có dữ liệu (cập nhật trong ngày)';}return '(không có dữ liệu)';}
    var a=s[0].day,b=s[s.length-1].day;return a===b?fmtD(a):fmtD(a)+' → '+fmtD(b);}
  var _r=render;render=function(){_r();document.getElementById('sub').textContent=rangeLabel();pushURL();};
  var genAt=new Date(D.generatedAt);
  var genStr=genAt.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Ho_Chi_Minh'});
  document.getElementById('foot').innerHTML='<b style="color:var(--brand)">Memon<sup>®</sup></b> · Gấu bông cao cấp — Trao cảm xúc, gửi yêu thương &nbsp;·&nbsp; Cập nhật '+genStr+' &nbsp;<span id="refreshCd" style="color:var(--muted2)"></span>';

  // Tự reload sau 31 phút để nhận data.js mới (GitHub Actions chạy mỗi 30 phút)
  (function(){
    var RELOAD_MS=31*60*1000, reloadAt=Date.now()+RELOAD_MS;
    function tick(){
      var left=Math.max(0,reloadAt-Date.now());
      var m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
      var el=document.getElementById('refreshCd');
      if(el)el.textContent='⟳ '+(left<60000?s+'s':m+':'+(s<10?'0':'')+s);
      if(left<=500)location.reload(); else setTimeout(tick,left>120000?30000:1000);
    }
    tick();
  })();

  loadURL();
  render();
})();
</script>
</body>
</html>
