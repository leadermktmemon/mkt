<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memon · Dashboard</title>
<style>
  /* ===== MEMON BRAND DESIGN SYSTEM ===== */
  :root{
    /* Brand */
    --brand:#15A9D6;--brand-dark:#0C8AB5;--brand-xdark:#086D90;
    --brand-light:#4FC9E8;--brand-soft:#E8F7FD;--brand-glow:rgba(21,169,214,.18);
    --pink:#F2709E;--pink-dark:#D4567F;--pink-soft:#FEF0F6;--pink-glow:rgba(242,112,158,.18);
    /* Gradient shortcuts */
    --grad:linear-gradient(135deg,var(--brand) 0%,var(--pink) 100%);
    --grad-soft:linear-gradient(135deg,var(--brand-soft) 0%,var(--pink-soft) 100%);
    /* Neutral */
    --bg:#EDF3F8;--card:#fff;--ink:#0D1C2E;--ink2:#253547;
    --muted:#637080;--muted2:#98A8B8;--line:#DDE6EF;--line-soft:#EBF1F7;
    /* Semantic */
    --teal:#17A97A;--teal-soft:#E5F7F0;--amber:#F59E0B;--amber-soft:#FEF3C7;
    --red:#EF4444;--red-soft:#FEE2E2;--green:#22C55E;--green-soft:#DCFCE7;
    --blue:#15A9D6;
    /* Shadows */
    --sh:0 2px 8px rgba(13,28,46,.07),0 1px 2px rgba(13,28,46,.04);
    --sh-md:0 6px 24px rgba(13,28,46,.11),0 2px 6px rgba(13,28,46,.06);
    --sh-lg:0 16px 48px rgba(13,28,46,.18);
    --sh-brand:0 4px 16px rgba(21,169,214,.28);
    --sh-pink:0 4px 16px rgba(242,112,158,.22);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 70% 40% at 90% 0%,rgba(21,169,214,.10) 0%,transparent 100%),radial-gradient(ellipse 60% 40% at 10% 100%,rgba(242,112,158,.08) 0%,transparent 100%);}
  .wrap{max-width:1120px;margin:0 auto;padding:24px 20px 56px;}

  /* ===== HEADER ===== */
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:0;background:var(--card);border-radius:18px;padding:16px 22px;box-shadow:var(--sh);}
  .brand{display:flex;align-items:center;gap:14px;}
  .logoimg{height:46px;width:auto;display:block;}
  .logoMark{font-size:30px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1.5px;font-family:"Segoe UI Rounded","Nunito","Segoe UI",-apple-system,sans-serif;line-height:1;}
  .logoMark sup{font-size:11px;}
  .brandtext h1{font-size:15px;margin:0;font-weight:700;color:var(--ink);}
  .tagline{font-size:11px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;margin-top:2px;letter-spacing:.3px;}
  .sub{font-size:12px;color:var(--muted);font-weight:500;}

  /* ===== BRAND BAR ===== */
  .brandbar{height:4px;border-radius:0 0 4px 4px;background:var(--grad);margin:0 0 22px;box-shadow:0 2px 12px rgba(21,169,214,.30);}

  /* ===== CONTROLS ===== */
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:22px;}
  .seg{display:inline-flex;background:var(--card);border:1.5px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--sh);}
  .seg button{border:0;background:transparent;padding:8px 14px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .15s;font-weight:500;}
  .seg button.on{background:var(--grad);color:#fff;font-weight:700;box-shadow:var(--sh-brand);}
  .seg button:hover:not(.on){background:var(--brand-soft);color:var(--brand-dark);}
  .seg .lbl{padding:8px 10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);border-right:1.5px solid var(--line);align-self:center;}
  .ctl{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:4px 12px;box-shadow:var(--sh);}
  .ctl .lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted2);}
  select,input[type=date]{font-family:inherit;font-size:13px;padding:5px 4px;border:0;background:transparent;color:var(--ink);cursor:pointer;font-weight:700;}
  input[type=date]{border:1.5px solid var(--line);border-radius:8px;background:var(--card);padding:5px 8px;}

  /* ===== KPI CARDS ===== */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:16px;}
  .kpi{background:var(--card);border:0;border-radius:14px;padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden;}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);}
  .kpi.accent::before{background:var(--grad);box-shadow:0 2px 8px rgba(21,169,214,.30);}
  .kpi .label{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .kpi .val{font-size:25px;font-weight:800;letter-spacing:-.6px;color:var(--ink);}

  /* ===== METRIC CARDS ===== */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:14px;margin-bottom:22px;}
  .ccard{background:var(--card);border:0;border-left:4px solid var(--brand);border-radius:14px;padding:20px 22px;box-shadow:var(--sh);}
  .ctitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .cmain{font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1.15;margin:0 0 2px;color:var(--ink);}
  .csub{font-size:12px;color:var(--muted);font-weight:500;margin:0 0 10px;line-height:1.4;}
  .cmetrics{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);}
  .cm{display:flex;justify-content:space-between;gap:6px;font-size:12px;padding:5px 0;border-top:1px solid var(--line-soft);}
  .cm:nth-child(-n+2){border-top:none;}
  .cm span{color:var(--muted);}
  .cm b{font-weight:700;}
  .cm b.mut{color:var(--muted2);font-weight:400;font-style:italic;}

  /* ===== LAYOUT ===== */
  .grid2{display:grid;grid-template-columns:1.2fr 0.8fr;gap:14px;margin-bottom:14px;}
  .panel{background:var(--card);border:0;border-radius:14px;padding:20px 22px;box-shadow:var(--sh);}
  .panel h2{font-size:13px;font-weight:800;margin:0 0 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--ink);letter-spacing:.1px;}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--muted);}
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:8px;height:8px;border-radius:2px;display:inline-block;}
  .cw{position:relative;width:100%;}

  /* ===== TABLE ===== */
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{text-align:right;padding:10px 8px;border-bottom:1px solid var(--line-soft);}
  th:first-child,td:first-child{text-align:left;}
  th{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--brand-dark);background:var(--brand-soft);border-bottom:2px solid rgba(21,169,214,.20);padding:11px 8px;}
  tbody tr:hover{background:linear-gradient(90deg,var(--brand-soft),transparent);}
  td.name{display:flex;align-items:center;gap:8px;}
  .note{font-size:12px;color:var(--muted);padding:6px 0;line-height:1.5;}
  td.mut,span.mut{color:var(--muted);}
  footer{margin-top:28px;font-size:12px;color:var(--muted);text-align:center;padding-top:16px;border-top:1px solid var(--line);}
  @media(max-width:760px){.grid2{grid-template-columns:1fr;}.cards{grid-template-columns:1fr;}}

  /* ===== GROWTH BADGES ===== */
  .cgrow{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:5px;vertical-align:middle;}
  .cgrow.up{background:var(--green-soft);color:#15803d;}
  .cgrow.dn{background:var(--red-soft);color:#dc2626;}
  .cgrow.nt{background:var(--line);color:var(--muted);}
  .cgrow.yoy{background:var(--pink-soft);color:var(--pink-dark);font-size:9.5px;opacity:.85;}
  .cgrow.yoy.dn{background:#fce7f3;color:#9d174d;}
  .cgrow.yoy.nt{background:var(--line);color:var(--muted);}

  /* ===== LEAD FUNNEL ===== */
  .fkpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;flex:1;min-width:180px;}
  .fkpi .ctitle{margin-bottom:6px;}
  .farrow{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 18px;min-width:76px;}
  .farrow-ico{font-size:20px;color:var(--muted2);line-height:1;}
  .farrow-pct{font-size:15px;font-weight:800;margin-top:4px;}
  .farrow-lbl{font-size:9.5px;color:var(--muted2);text-align:center;margin-top:1px;}
  .fsrc-title{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:10px;}
  .fsrc-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;flex:1;min-width:280px;}
  .fsrc-head{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line-soft);}
  .fsrc-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .fsrc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .fsrc-val{font-size:23px;font-weight:800;line-height:1.1;}
  .fsrc-lbl{font-size:10.5px;color:var(--muted);margin:3px 0 8px;}
  .fsrc-sub{font-size:11.5px;color:var(--muted);}
  .fsrc-sub b{color:var(--ink);font-weight:700;}

  /* ===== CAMPAIGN MODAL ===== */
  #campModal{display:none;position:fixed;inset:0;background:rgba(10,20,35,.65);z-index:900;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
  #campModal.open{display:flex;}
  .mbox{background:var(--card);border-radius:20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:var(--sh-lg);}
  .mimg{width:100%;border-radius:20px 20px 0 0;max-height:320px;object-fit:contain;display:block;background:#0D1B2A;}
  .mimg-lowres{width:auto;max-width:160px;margin:0 auto;image-rendering:auto;}
  .mnoi{width:100%;height:120px;border-radius:20px 20px 0 0;background:var(--grad-soft);display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:12px;}
  .mcarousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;border-radius:20px 20px 0 0;background:#0D1B2A;scrollbar-width:none;gap:3px;}
  .mcarousel::-webkit-scrollbar{display:none;}
  .mcarousel img{flex:0 0 calc(100% - 3px);max-height:320px;object-fit:contain;scroll-snap-align:start;display:block;background:#0D1B2A;}
  .mcar-info{text-align:center;padding:6px 12px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--line);}
  .mbody{padding:22px 24px 26px;}
  .mclose{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;border:0;font-size:20px;line-height:30px;cursor:pointer;text-align:center;z-index:1;transition:background .15s;}
  .mclose:hover{background:rgba(0,0,0,.7);}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:12px;overflow:hidden;margin:14px 0;}
  .mcell{background:var(--card);padding:12px 16px;}
  .mcell .ml{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
  .mcell .mv{font-size:17px;font-weight:800;color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="logo.png" alt="Memon" class="logoimg" onerror="this.outerHTML='<span class=\'logoMark\'>Memon<sup>®</sup></span>'">
      <div class="brandtext">
        <h1>Marketing Report</h1>
        <div class="tagline">Trao cảm xúc · Gửi yêu thương 🧸</div>
      </div>
    </div>
    <div class="sub" id="sub"></div>
  </header>
  <div class="brandbar"></div>

  <div class="controls">
    <div class="seg" id="segGroup">
      <span class="lbl">Nhóm</span>
      <button data-grp="1" class="on">1 · Doanh Số</button>
      <button data-grp="2">2 · Campaign</button>
      <button data-grp="3">3 · Theo kênh</button>
    </div>
    <div class="ctl">
      <span class="lbl">Kỳ</span>
      <select id="periodSel">
        <option value="today">Hôm nay</option>
        <option value="yesterday">Hôm qua</option>
        <option value="2days">2 ngày qua</option>
        <option value="3days">3 ngày qua</option>
        <option value="thisweek">Tuần này</option>
        <option value="lastweek">Tuần trước</option>
        <option value="7">7 ngày qua</option>
        <option value="30" selected>30 ngày qua</option>
        <option value="month">Tháng này</option>
        <option value="lastmonth">Tháng trước</option>
        <option value="90">90 ngày qua</option>
        <option value="365">1 năm qua</option>
        <option value="custom">Chọn ngày…</option>
      </select>
      <span id="customRange" style="display:none;align-items:center;gap:6px;">
        <input type="date" id="dFrom"> <span style="color:var(--muted);">→</span> <input type="date" id="dTo">
      </span>
    </div>
    <div class="seg" id="segGran">
      <span class="lbl">Gộp</span>
      <button data-g="day" class="on">Ngày</button>
      <button data-g="week">Tuần</button>
      <button data-g="month">Tháng</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="panel" id="leadFunnelPanel" style="display:none;margin-bottom:16px;">
    <h2 style="display:flex;justify-content:space-between;align-items:center;">Phễu Lượt khách → Lead L4 <span id="leadFunnelPeriod" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div id="leadFunnelBody"></div>
    <p class="note" id="leadFunnelNote" style="margin-top:10px;"></p>
  </div>

  <div class="panel" id="trendPanel" style="margin-bottom:16px;">
    <h2><span id="trendTitle">Xu hướng doanh thu</span><span id="granLabel" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div class="legend" id="legTrend"></div>
    <div class="cw" style="height:300px;"><canvas id="cTrend"></canvas></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2 id="bdTitle">Theo nguồn / kênh</h2>
      <table id="bdTable"><thead></thead><tbody></tbody></table>
      <div class="note" id="bdNote" style="display:none;"></div>
    </div>
    <div class="panel">
      <h2 id="mixTitle">Cơ cấu</h2>
      <div class="legend" id="legMix"></div>
      <div class="cw" style="height:230px;"><canvas id="cMix"></canvas></div>
    </div>
  </div>

  <div class="panel" id="storePanel">
    <h2>Doanh thu theo cửa hàng <span style="font-size:12px;color:var(--muted);font-weight:400;">(bán lẻ tại quầy)</span></h2>
    <div class="cw" id="storeWrap" style="height:420px;"><canvas id="cStore"></canvas></div>
  </div>

  <div class="panel" id="campaignPanel" style="display:none;margin-bottom:16px;">
    <h2 style="display:flex;justify-content:space-between;align-items:center;">Chiến dịch Facebook <span id="campPeriod" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <select id="campAccountFilter" style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
        <option value="">Tất cả tài khoản</option>
      </select>
      <select id="campStatusFilter" style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
        <option value="">Tất cả trạng thái</option>
        <option value="ACTIVE">Đang chạy (ACTIVE)</option>
        <option value="PAUSED">Đã dừng (PAUSED)</option>
        <option value="ARCHIVED">Đã lưu trữ</option>
      </select>
      <select id="campEffFilter" style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
        <option value="">Tất cả hiệu quả</option>
        <option value="good">🟢 Tốt</option>
        <option value="ok">🟡 Khá</option>
        <option value="poor">🔴 Kém / Đắt</option>
        <option value="none">⚪ Chưa đo</option>
      </select>
      <input type="text" id="campSearch" placeholder="🔍 Tìm tên chiến dịch..." style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);min-width:190px;outline:none;" onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--line)'">
      <span id="campSummary" style="font-size:13px;color:var(--muted);"></span>
    </div>
    <div id="campBody"></div>
    <div class="note" id="campNote" style="margin-top:10px;"></div>
  </div>

  <footer id="foot"></footer>
</div>

<div id="campModal" onclick="if(event.target===this)closeCampModal()">
  <div class="mbox">
    <button class="mclose" onclick="closeCampModal()">×</button>
    <div id="mImgArea"></div>
    <div class="mbody" id="mBody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<script>
(function(){
  var D=window.DASHBOARD_DATA; if(!D||!D.daily){document.getElementById('sub').textContent='Không tìm thấy data.js';return;}
  var PALETTE={'FB Bemori':'#378ADD','Facebook':'#378ADD','Zalo Bemori':'#1D9E75','Zalo cá nhân':'#1D9E75','Admin':'#888780','Khách lẻ':'#888780','Shopee':'#D85A30','Instagram':'#D4537E','Insta Bemori':'#D4537E','Zalo OA':'#BA7517','Website':'#7F77DD','Web Bemori':'#7F77DD'};
  var FB=['#378ADD','#1D9E75','#D85A30','#D4537E','#BA7517','#7F77DD','#888780','#26215C','#0F6E56','#993C1D'];
  var colorOf=function(n,i){return PALETTE[n]||FB[i%FB.length];};
  function vnd(n){n=Math.round(n); if(n>=1e9)return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+' tỷ'; if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' tr'; if(n>=1e3)return Math.round(n/1e3)+'K'; return String(n);}
  var full=function(n){return Math.round(n).toLocaleString('vi-VN')+'đ';};
  Chart.defaults.color='#6b7280'; Chart.defaults.font.family='inherit'; var grid='rgba(0,0,0,0.06)';
  var COL={'Bemori':'#378ADD','Memon':'#7F77DD','Online':'#378ADD','Cửa hàng':'#1D9E75','Teddy':'#D4537E','Khác':'#888780','GBO/NNGB':'#BA7517','Facebook':'#378ADD','Instagram':'#D4537E','Zalo':'#1D9E75','Website':'#7F77DD','Bán lẻ NK':'#888780','Ads':'#D85A30','Tự nhiên / Viral':'#1D9E75'};
  var COST='— (chờ ads)';

  var group='1', period='30', gran='day', cFrom=null, cTo=null, charts={};
  var campSort={brand:{col:'spend',dir:1},conv:{col:'spend',dir:1}};
  window.sortCamp=function(type,col){if(campSort[type].col===col)campSort[type].dir*=-1;else{campSort[type].col=col;campSort[type].dir=1;}render();};

  function sliceFor(p){ var d=D.daily; if(!d.length)return [];

    var _vnDaysAgo=function(n){return new Date(Date.now()+7*3600*1000-n*86400000).toISOString().slice(0,10);};

    if(p==='7'){var t7=_vnToday();var f7=_vnDaysAgo(6);return d.filter(function(x){return x.day>=f7&&x.day<=t7;});}
    if(p==='30'){var t30=_vnToday();var f30=_vnDaysAgo(29);return d.filter(function(x){return x.day>=f30&&x.day<=t30;});}
    if(p==='90'){var t90=_vnToday();var f90=_vnDaysAgo(89);return d.filter(function(x){return x.day>=f90&&x.day<=t90;});}
    if(p==='365'){var t365=_vnToday();var f365=_vnDaysAgo(364);return d.filter(function(x){return x.day>=f365&&x.day<=t365;});}
    if(p==='today'){var t=_vnToday();return d.filter(function(x){return x.day===t;});}
    if(p==='yesterday'){var y=_vnDaysAgo(1);return d.filter(function(x){return x.day===y;});}
    if(p==='2days'){var t2=_vnDaysAgo(1);var f2=_vnDaysAgo(2);return d.filter(function(x){return x.day>=f2&&x.day<=t2;});}
    if(p==='3days'){var t3=_vnDaysAgo(1);var f3=_vnDaysAgo(3);return d.filter(function(x){return x.day>=f3&&x.day<=t3;});}
    if(p==='thisweek'){var nw=_vnNow();var dw=nw.getUTCDay();var off=dw===0?6:dw-1;var mon=new Date(nw.getTime()-off*86400000).toISOString().slice(0,10);var tod=nw.toISOString().slice(0,10);return d.filter(function(x){return x.day>=mon&&x.day<=tod;});}
    if(p==='lastweek'){var nw2=_vnNow();var dw2=nw2.getUTCDay();var off2=dw2===0?6:dw2-1;var thisMon=new Date(nw2.getTime()-off2*86400000);var lMon=new Date(thisMon.getTime()-7*86400000).toISOString().slice(0,10);var lSun=new Date(thisMon.getTime()-86400000).toISOString().slice(0,10);return d.filter(function(x){return x.day>=lMon&&x.day<=lSun;});}
    // month: thang hien tai theo gio VN

    if(p==='custom')return d.filter(function(x){return (!cFrom||x.day>=cFrom)&&(!cTo||x.day<=cTo);});

      var vStr=d===0?nf(v):v;

      html+='<div class="fsrc-title">Hiệu quả doanh thu (ROAS) <span style="font-weight:400;color:var(--muted2)">— Doanh thu ÷ Chi phí quảng cáo thực (Meta / Google Ads API)</span></div>';

    var noteEl=document.getElementById('leadFunnelNote');
    noteEl.innerHTML='<b>Lượt khách (L)</b>: FB+IG+Zalo+Web · <b>Lead tiềm năng</b> = L4+L5, khớp field "Tổng Lead tiềm năng" của Lark · <b>Lead → tiềm năng (%)</b> đo lượng, KHÔNG phải tỷ lệ chốt — FB Ads có % này thấp hơn do lượng lead thô rất lớn (nhiều tương tác nhẹ chưa đủ điều kiện). <b>Lead theo nguồn</b> chia 3 phần tách biệt cộng lại = Tổng: Facebook Ads (lead gắn ads) · GG ads (Lark gọi "GG Ads", thực chất = Zalo + Web) · Tự nhiên (còn lại, chủ yếu FB+IG không ads). <b>Tỷ lệ chốt theo nhóm</b> = L5 (đã chốt) ÷ (L4+L5) — riêng Facebook Ads được tự tính cộng dồn từ dữ liệu chi tiết (Lark không đưa số này vào bảng tổng hợp tháng), Facebook (FB+IG) là cả kênh gộp theo đúng field Lark. Đã đối chiếu khớp 8/8 số lượng với báo cáo Lark; 3 tỷ lệ chốt còn lại lệch ~1 điểm vì Lark tự tính trung bình ngày không nhất quán giữa các thẻ.'+(daysWithLead<slice.length?' ⚠ Một số ngày chưa nhập Lead.':'');

  function drawDonut(id,labels,vals,colors){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+': '+full(c.parsed);}}}}}});}
  function drawBar(id,labels,vals,color){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{data:vals,backgroundColor:color,borderRadius:4,barThickness:20}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return full(c.parsed.x);}}}},scales:{x:{grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}},y:{grid:{display:false}}}}});}
  function drawStacked(id,labels,series){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:series},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+full(c.parsed.y);}}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}}}}});}

  function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  window.showCampModal=function(id){
    var c=window._camps&&window._camps[id];if(!c)return;
    var cr=c.creative||{};
    // Uu tien: carousel CDN > anh cao res CDN > thumbnail local
    var imgs=cr.images&&cr.images.length>0?cr.images:(cr.imageUrl?[cr.imageUrl]:(c.thumb?[c.thumb]:[]));
    var imgArea=document.getElementById('mImgArea');
    if(!imgs.length){
      imgArea.innerHTML='<div class="mnoi">Không có ảnh</div>';
    }else if(imgs.length===1){
      var el=document.createElement('img');el.className='mimg';el.alt='';el.src=imgs[0];
      // Anh chi den tu thumbnail local (khong co CDN chat luong cao) -> anh rat nho, khong keo full-width de tranh vo net
      if(imgs[0]===c.thumb&&!(cr.imageUrl)&&(!cr.images||!cr.images.length))el.className+=' mimg-lowres';
      el.onerror=function(){imgArea.innerHTML='<div class="mnoi">Không có ảnh</div>';};
      imgArea.innerHTML='';imgArea.appendChild(el);
    }else{
      var ch='<div class="mcarousel">';
      imgs.forEach(function(src){ch+='<img src="'+escHtml(src)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';});
      ch+='</div><div class="mcar-info">'+imgs.length+' ảnh carousel · vuốt ngang để xem</div>';
      imgArea.innerHTML=ch;
    }
    var isBrand=c.type==='brand';
    var SLtxt={'ACTIVE':'<span style="color:#15803d;font-weight:600">● Đang chạy</span>','PAUSED':'<span style="color:#aaa">⏸ Đã dừng</span>','ARCHIVED':'<span style="color:#dc2626">✕ Lưu trữ</span>'};
    var effHtml=(function(){
      var st='font-size:12px;padding:3px 10px;border-radius:5px;font-weight:600;';
      if(c.eff==='good')return '<span style="'+st+'background:#dcfce7;color:#15803d">Tốt</span>';
      if(c.eff==='ok')return '<span style="'+st+'background:#fef9c3;color:#a16207">Khá</span>';
      if(c.eff==='poor')return '<span style="'+st+'background:#fee2e2;color:#dc2626">'+(isBrand?'Đắt':'Kém')+'</span>';
      return '<span style="font-size:12px;color:var(--muted2)">Chưa đo</span>';
    })();
    var typeTag=isBrand?'<span style="font-size:12px;padding:3px 10px;border-radius:5px;background:#e6f1fb;color:#185fa5;font-weight:600">📣 Branding</span>':'<span style="font-size:12px;padding:3px 10px;border-radius:5px;background:#e1f5ee;color:#0f6e56;font-weight:600">🎯 Doanh số</span>';
    var cells=isBrand?[
      ['Chi phí',vnd(c.spend)],['Hiển thị',c.impressions?Math.round(c.impressions/1000)+'K':'—'],
      ['CPM',c.cpm?vnd(c.cpm):'—'],['Tương tác',c.engagement?c.engagement.toLocaleString('vi-VN'):'—'],
      ['CPE',c.cpe?vnd(c.cpe):'—']
    ]:[
      ['Chi phí',vnd(c.spend)],['Hiển thị',c.impressions?Math.round(c.impressions/1000)+'K':'—'],
      ['Tin nhắn',c.messages||'—'],['Lead',c.leads||'—'],
      ['Đơn mua',c.purchases||'—'],['DT pixel',c.purchaseValue?vnd(c.purchaseValue):'—'],
      ['CPO',c.cpo?vnd(c.cpo):'—'],['ROAS FB Ads',c.roas?c.roas.toFixed(1)+'x':'—']
    ];
    var b='';
    b+='<div style="font-size:16px;font-weight:800;line-height:1.35;margin-bottom:5px">'+c.name+'</div>';
    b+='<div style="font-size:12px;color:var(--muted);margin-bottom:12px">'+c.account+' · '+(SLtxt[c.status]||c.status)+'</div>';
    b+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px">'+typeTag+' '+effHtml+'</div>';
    b+='<div class="mgrid">';
    cells.forEach(function(cl){b+='<div class="mcell"><div class="ml">'+cl[0]+'</div><div class="mv">'+cl[1]+'</div></div>';});
    b+='</div>';
    b+='<a href="https://adsmanager.facebook.com/adsmanager/manage/campaigns?selected_campaign_ids='+c.id+'" target="_blank" rel="noopener" style="font-size:13px;color:var(--brand);font-weight:600;text-decoration:none">Xem chiến dịch trên Meta Ads Manager →</a>';
    if(cr.title||cr.body){
      b+='<div style="border-top:1px solid var(--line);margin-top:16px;padding-top:16px">';
      b+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">Nội dung quảng cáo</div>';
      if(cr.title)b+='<div style="font-size:14px;font-weight:700;line-height:1.4;margin-bottom:8px">'+escHtml(cr.title)+'</div>';
      if(cr.body)b+='<div style="font-size:13px;line-height:1.7;color:var(--ink);white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:12px">'+escHtml(cr.body)+'</div>';
      if(cr.cta){var ctaMap={MESSAGE_PAGE:'Nhắn tin',SHOP_NOW:'Mua ngay',LEARN_MORE:'Tìm hiểu thêm',SIGN_UP:'Đăng ký',CONTACT_US:'Liên hệ',SUBSCRIBE:'Đăng ký nhận tin',BOOK_NOW:'Đặt ngay',DOWNLOAD:'Tải về',GET_OFFER:'Nhận ưu đãi',WATCH_VIDEO:'Xem video',APPLY_NOW:'Đăng ký ngay',GET_QUOTE:'Nhận báo giá',CALL_NOW:'Gọi ngay',ORDER_NOW:'Đặt hàng ngay',NO_BUTTON:'(không có nút)'};b+='<div style="display:inline-block;margin-top:10px;padding:6px 14px;border-radius:7px;background:var(--brand);color:#fff;font-size:12px;font-weight:700">'+(ctaMap[cr.cta]||cr.cta)+'</div>';}
      b+='</div>';
    }
    document.getElementById('mBody').innerHTML=b;

    document.body.style.overflow='hidden';

  window.closeCampModal=function(){document.getElementById('campModal').classList.remove('open');document.body.style.overflow='';};
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeCampModal();});

  function fmtD(d){return d.split('-').reverse().join('/');}
  function rangeLabel(){
    var todayVN=new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);
    var rawSlice=sliceFor(period); // slice truoc fallback (de biet co data thuc hom nay khong)
    var s=sliceFor(period); // slice da co fallback trong render()
    // Lay slice hien tai tu DOM (sau fallback da ap dung)
    // Dung bien 'slice' trong closure cua render
    if(!rawSlice.length||(period==='today'&&rawSlice.length===1&&!rawSlice[0].onlineRev&&!rawSlice[0].storeRev&&!rawSlice[0].onlineOrders)){
      if(period==='today'){
        var ld=D.daily.length?D.daily[D.daily.length-1].day:'';
        return fmtD(todayVN)+' · dữ liệu mới nhất '+fmtD(ld)+'(chờ cập nhật)';
      }
      return '(không có dữ liệu)';
    }
    var a=s[0].day,b=s[s.length-1].day;
    // Neu la period co ngay cu the (today/thisweek/lastweek/month), hien dung ngay
    if(period==='yesterday'){var _y=new Date(Date.now()+7*3600*1000-86400000).toISOString().slice(0,10);return fmtD(_y);}
    if(period==='2days'){return fmtD(new Date(Date.now()+7*3600*1000-2*86400000).toISOString().slice(0,10))+' → '+fmtD(new Date(Date.now()+7*3600*1000-86400000).toISOString().slice(0,10));}
    if(period==='3days'){return fmtD(new Date(Date.now()+7*3600*1000-3*86400000).toISOString().slice(0,10))+' → '+fmtD(new Date(Date.now()+7*3600*1000-86400000).toISOString().slice(0,10));}
    if(period==='7')return fmtD(new Date(Date.now()+7*3600*1000-6*86400000).toISOString().slice(0,10))+' → '+fmtD(todayVN);
    if(period==='30')return fmtD(new Date(Date.now()+7*3600*1000-29*86400000).toISOString().slice(0,10))+' → '+fmtD(todayVN);
    if(period==='90')return fmtD(new Date(Date.now()+7*3600*1000-89*86400000).toISOString().slice(0,10))+' → '+fmtD(todayVN);
    if(period==='365')return fmtD(new Date(Date.now()+7*3600*1000-364*86400000).toISOString().slice(0,10))+' → '+fmtD(todayVN);
    return a===b?fmtD(a):fmtD(a)+' → '+fmtD(b);
  }
  var _r=render;render=function(){_r();document.getElementById('sub').textContent=rangeLabel();pushURL();};
  var genAt=new Date(D.generatedAt);
  var genStr=genAt.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Ho_Chi_Minh'});
  document.getElementById('foot').innerHTML='<b style="color:var(--brand)">Memon<sup>®</sup></b> · Gấu bông cao cấp — Trao cảm xúc, gửi yêu thương &nbsp;·&nbsp; Cập nhật '+genStr+' &nbsp;<span id="refreshCd" style="color:var(--muted2)"></span>';

  // Tự reload sau 31 phút để nhận data.js mới (GitHub Actions chạy mỗi 30 phút)
  (function(){
    var RELOAD_MS=31*60*1000, reloadAt=Date.now()+RELOAD_MS;
    function tick(){
      var left=Math.max(0,reloadAt-Date.now());
      var m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
      var el=document.getElementById('refreshCd');
      if(el)el.textContent='⟳ '+(left<60000?s+'s':m+':'+(s<10?'0':'')+s);
      if(left<=500)location.reload(); else setTimeout(tick,left>120000?30000:1000);
    }
    tick();
  })();

  loadURL();
  render();
})();
