<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memon · Dashboard</title>
<style>
  :root{ --bg:#f4f5f7; --card:#fff; --ink:#1a1c1f; --muted:#6b7280; --line:#e6e8eb; --blue:#378ADD; --teal:#1D9E75; --amber:#BA7517; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 48px;}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .logoimg{height:42px;width:auto;display:block;}
  .logotext{font-size:26px;font-weight:700;color:#1CA9D8;letter-spacing:-0.5px;}
  h1{font-size:20px;margin:0 0 0 4px;font-weight:600;display:inline;}
  .sub{font-size:13px;color:var(--muted);}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:18px;}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap;}
  .seg button{border:0;background:transparent;padding:8px 13px;font-size:13px;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--blue);color:#fff;font-weight:600;}
  .seg .lbl{padding:8px 10px;font-size:12px;color:var(--muted);border-right:1px solid var(--line);align-self:center;}
  .ctl{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px 10px;}
  .ctl .lbl{font-size:12px;color:var(--muted);}
  select,input[type=date]{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);cursor:pointer;}
  select{border:0;padding:6px 4px;font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;margin-bottom:18px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .kpi.accent{border-color:var(--blue);border-width:2px;}
  .kpi .label{font-size:13px;color:var(--muted);margin-bottom:6px;}
  .kpi .val{font-size:25px;font-weight:700;letter-spacing:-0.5px;}
  .grid2{display:grid;grid-template-columns:1.15fr 0.85fr;gap:16px;margin-bottom:16px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .panel h2{font-size:15px;font-weight:600;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:var(--muted);}
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .cw{position:relative;width:100%;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:right;padding:8px 6px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  th{color:var(--muted);font-weight:500;}
  td.name{display:flex;align-items:center;gap:8px;}
  .note{font-size:13px;color:var(--muted);padding:8px 0;}
  footer{margin-top:24px;font-size:12px;color:var(--muted);text-align:center;}
  @media(max-width:760px){.grid2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="logo.png" alt="Memon" class="logoimg" onerror="this.outerHTML='<span class=\'logotext\'>Memon</span>'">
      <h1>Dashboard</h1>
    </div>
    <div class="sub" id="sub"></div>
  </header>

  <div class="controls">
    <div class="seg brand" id="segScope">
      <span class="lbl">Xem</span>
      <button data-s="all" class="on">Tất cả</button>
      <button data-s="Bemori">Bemori</button>
      <button data-s="Online">› Online</button>
      <button data-s="Cửa hàng">› Cửa hàng</button>
      <button data-s="Memon">Memon (B2B)</button>
    </div>
    <div class="ctl">
      <span class="lbl">Kỳ</span>
      <select id="periodSel">
        <option value="today">Hôm nay</option>
        <option value="7">7 ngày qua</option>
        <option value="30" selected>30 ngày qua</option>
        <option value="month">Tháng này</option>
        <option value="90">90 ngày qua</option>
        <option value="365">1 năm qua</option>
        <option value="custom">Chọn ngày…</option>
      </select>
      <span id="customRange" style="display:none;align-items:center;gap:6px;">
        <input type="date" id="dFrom"> <span style="color:var(--muted);">→</span> <input type="date" id="dTo">
      </span>
    </div>
    <div class="seg" id="segGran">
      <span class="lbl">Gộp</span>
      <button data-g="day" class="on">Ngày</button>
      <button data-g="week">Tuần</button>
      <button data-g="month">Tháng</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="panel" style="margin-bottom:16px;">
    <h2><span id="trendTitle">Xu hướng doanh thu</span><span id="granLabel" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div class="legend" id="legTrend"></div>
    <div class="cw" style="height:300px;"><canvas id="cTrend"></canvas></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2 id="bdTitle">Theo nguồn / kênh</h2>
      <table id="bdTable"><thead></thead><tbody></tbody></table>
    </div>
    <div class="panel">
      <h2 id="mixTitle">Cơ cấu</h2>
      <div class="legend" id="legMix"></div>
      <div class="cw" style="height:230px;"><canvas id="cMix"></canvas></div>
    </div>
  </div>

  <div class="panel" id="storePanel">
    <h2>Doanh thu theo cửa hàng <span style="font-size:12px;color:var(--muted);font-weight:400;">(bán lẻ tại quầy)</span></h2>
    <div class="cw" id="storeWrap" style="height:420px;"><canvas id="cStore"></canvas></div>
  </div>

  <footer id="foot"></footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<script>
(function(){
  var D=window.DASHBOARD_DATA; if(!D||!D.daily){document.getElementById('sub').textContent='Không tìm thấy data.js';return;}
  var PALETTE={'FB Bemori':'#378ADD','Facebook':'#378ADD','Zalo Bemori':'#1D9E75','Zalo cá nhân':'#1D9E75','Admin':'#888780','Khách lẻ':'#888780','Shopee':'#D85A30','Instagram':'#D4537E','Insta Bemori':'#D4537E','Zalo OA':'#BA7517','Website':'#7F77DD','Web Bemori':'#7F77DD'};
  var FB=['#378ADD','#1D9E75','#D85A30','#D4537E','#BA7517','#7F77DD','#888780','#26215C','#0F6E56','#993C1D'];
  var colorOf=function(n,i){return PALETTE[n]||FB[i%FB.length];};
  function vnd(n){n=Math.round(n); if(n>=1e9)return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+' tỷ'; if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' tr'; if(n>=1e3)return Math.round(n/1e3)+'K'; return String(n);}
  var full=function(n){return Math.round(n).toLocaleString('vi-VN')+'đ';};
  Chart.defaults.color='#6b7280'; Chart.defaults.font.family='inherit'; var grid='rgba(0,0,0,0.06)';
  var COL={'Bemori':'#378ADD','Memon':'#BA7517','Online':'#378ADD','Cửa hàng':'#1D9E75'};

  var scope='all', period='30', gran='day', cFrom=null, cTo=null, charts={};

  function sliceFor(p){ var d=D.daily; if(!d.length)return [];
    if(p==='7')return d.slice(-7); if(p==='30')return d.slice(-30);
    if(p==='90')return d.slice(-90); if(p==='365')return d.slice(-365);
    if(p==='today'){var t=new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);return d.filter(function(x){return x.day===t;});}
    if(p==='month'){var m=d[d.length-1].day.slice(0,7);return d.filter(function(x){return x.day.slice(0,7)===m;});}
    if(p==='custom')return d.filter(function(x){return (!cFrom||x.day>=cFrom)&&(!cTo||x.day<=cTo);});
    return d; }

  function sumOnline(s){var r=0;s.forEach(function(d){r+=d.onlineRev||0;});return r;}
  function sumStore(s){var r=0;s.forEach(function(d){r+=d.storeRev||0;});return r;}
  function sumStoreOnline(s){var r=0;s.forEach(function(d){r+=d.storeOnline||0;});return r;}
  function sumMemon(s){var r=0;s.forEach(function(d){r+=d.memonRev||0;});return r;}
  function onlineAgg(s){var ch={},total=0,orders=0;s.forEach(function(d){for(var k in d.online){ch[k]=ch[k]||{rev:0,orders:0};ch[k].rev+=d.online[k].rev;ch[k].orders+=d.online[k].orders;total+=d.online[k].rev;orders+=d.online[k].orders;}});
    var list=Object.keys(ch).sort(function(a,b){return ch[b].rev-ch[a].rev;}).map(function(n){return {name:n,orders:ch[n].orders,revenue:ch[n].rev,aov:ch[n].orders?Math.round(ch[n].rev/ch[n].orders):0,share:total?Math.round(ch[n].rev/total*100):0};});
    return {list:list,total:total,orders:orders};}
  function storeAgg(s){var st={},total=0;s.forEach(function(d){for(var k in d.store){st[k]=(st[k]||0)+d.store[k];total+=d.store[k];}});
    return {list:Object.keys(st).sort(function(a,b){return st[b]-st[a];}).map(function(n){return {name:n,revenue:st[n],share:total?Math.round(st[n]/total*100):0};}),total:total};}
  function memonAgg(s){var dset={};s.forEach(function(d){dset[d.day]=1;});var cust={},total=0,bills=0;(D.memonBills||[]).forEach(function(b){if(dset[b.day]){cust[b.customer]=cust[b.customer]||{rev:0,n:0};cust[b.customer].rev+=b.amount;cust[b.customer].n++;total+=b.amount;bills++;}});
    return {list:Object.keys(cust).sort(function(a,b){return cust[b].rev-cust[a].rev;}).map(function(n){return {name:n,orders:cust[n].n,revenue:cust[n].rev,share:total?Math.round(cust[n].rev/total*100):0};}),total:total,bills:bills,customers:Object.keys(cust).length};}
  function bucketKey(day,g){if(g==='month')return day.slice(0,7);if(g==='week'){var d=new Date(day+'T00:00:00Z');var dow=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-dow);return d.toISOString().slice(0,10);}return day;}

  function render(){
    var slice=sliceFor(period);
    var on=sumOnline(slice),st=sumStore(slice),mem=sumMemon(slice);
    var showStore=(scope==='all'||scope==='Bemori');

    // KPIs
    var k=[];
    if(scope==='all'){
      k=[{label:'Tổng doanh thu',val:vnd(on+st+mem),accent:true},
         {label:'Online (marketing)',val:vnd(on)},
         {label:'Cửa hàng (bán lẻ)',val:vnd(st)},
         {label:'Memon (B2B/sỉ)',val:vnd(mem)}];
    } else if(scope==='Bemori'){
      var tot=on+st;
      k=[{label:'Doanh thu Bemori',val:vnd(tot),accent:true},
         {label:'Online (marketing)',val:vnd(on)},
         {label:'Cửa hàng (bán lẻ)',val:vnd(st)},
         {label:'% Online / Cửa hàng',val:(tot?Math.round(on/tot*100):0)+'% · '+(tot?Math.round(st/tot*100):0)+'%'}];
    } else if(scope==='Online'){
      var o=onlineAgg(slice);
      k=[{label:'Doanh thu Online',val:vnd(on),accent:true},
         {label:'Số đơn',val:o.orders.toLocaleString('vi-VN')},
         {label:'AOV',val:vnd(o.orders?on/o.orders:0)},
         {label:'Số nguồn',val:o.list.length}];
    } else if(scope==='Cửa hàng'){
      var sa=storeAgg(slice);
      var mktCH=sumStoreOnline(slice);
      var pct=(st+mktCH)?Math.round(mktCH/(st+mktCH)*100):0;
      k=[{label:'Doanh thu tại quầy',val:vnd(st),accent:true},
         {label:'Marketing giao tại CH',val:vnd(mktCH)},
         {label:'% Marketing → Cửa hàng',val:pct+'%'},
         {label:'Số cửa hàng',val:sa.list.length}];
    } else {
      var m=memonAgg(slice);
      k=[{label:'Doanh thu B2B/Sỉ',val:vnd(mem),accent:true},
         {label:'Số hóa đơn',val:m.bills.toLocaleString('vi-VN')},
         {label:'AOV',val:vnd(m.bills?mem/m.bills:0)},
         {label:'Khách B2B',val:m.customers}];
    }
    document.getElementById('kpis').innerHTML=k.map(function(x){return '<div class="kpi'+(x.accent?' accent':'')+'"><div class="label">'+x.label+'</div><div class="val">'+x.val+'</div></div>';}).join('');

    // Trend
    var keys,valFn;
    if(scope==='all'){keys=['Bemori','Memon'];valFn=function(d){return {Bemori:(d.onlineRev||0)+(d.storeRev||0),Memon:d.memonRev||0};};}
    else if(scope==='Bemori'){keys=['Online','Cửa hàng'];valFn=function(d){return {Online:d.onlineRev||0,'Cửa hàng':d.storeRev||0};};}
    else if(scope==='Online'){keys=['Online'];valFn=function(d){return {Online:d.onlineRev||0};};}
    else if(scope==='Cửa hàng'){keys=['Cửa hàng'];valFn=function(d){return {'Cửa hàng':d.storeRev||0};};}
    else {keys=['Memon'];valFn=function(d){return {Memon:d.memonRev||0};};}
    var idx={},buckets=[];
    slice.forEach(function(d){var key=bucketKey(d.day,gran);if(idx[key]===undefined){idx[key]=buckets.length;buckets.push({key:key,t:{}});}var bk=buckets[idx[key]];var v=valFn(d);keys.forEach(function(t){bk.t[t]=(bk.t[t]||0)+(v[t]||0);});});
    var tSeries=keys.filter(function(t){return buckets.some(function(x){return x.t[t];});}).map(function(t){return {label:t,data:buckets.map(function(x){return Math.round(x.t[t]||0);}),backgroundColor:COL[t]||'#888',stack:'x',borderRadius:2};});
    document.getElementById('trendTitle').textContent='Xu hướng doanh thu'+(scope==='all'?' theo nhánh':scope==='Bemori'?' Online/Cửa hàng':' '+scope);
    document.getElementById('granLabel').textContent='(theo '+(gran==='day'?'ngày':gran==='week'?'tuần':'tháng')+')';
    document.getElementById('legTrend').innerHTML=tSeries.map(function(s){return '<span><span class="dot" style="background:'+s.backgroundColor+'"></span>'+s.label+'</span>';}).join('');
    drawStacked('cTrend',buckets.map(function(x){return gran==='month'?x.key:x.key.slice(5);}),tSeries);

    // Breakdown + mix
    var rows,head,mixL,mixV,mixC,leg,bdT,mixT;
    if(scope==='Memon'){
      var M=memonAgg(slice);var top=M.list.slice(0,10);
      bdT='Top khách hàng B2B';mixT='Cơ cấu khách B2B';
      head='<tr><th>Khách hàng</th><th>HĐ</th><th>Doanh thu</th><th>%</th></tr>';
      rows=top.map(function(c,i){return '<tr><td class="name"><span class="dot" style="background:'+colorOf(c.name,i)+'"></span>'+c.name+'</td><td>'+c.orders+'</td><td>'+vnd(c.revenue)+'</td><td>'+c.share+'%</td></tr>';}).join('')||'<tr><td colspan="4" class="note">Không có đơn sỉ trong kỳ</td></tr>';
      mixL=top.map(function(c){return c.name;});mixV=top.map(function(c){return c.revenue;});mixC=top.map(function(c,i){return colorOf(c.name,i);});
      leg=top.slice(0,6).map(function(c,i){return '<span><span class="dot" style="background:'+colorOf(c.name,i)+'"></span>'+c.share+'%</span>';}).join('');
    } else if(scope==='Cửa hàng'){
      var SA=storeAgg(slice);
      bdT='Doanh thu theo cửa hàng';mixT='Cơ cấu cửa hàng';
      head='<tr><th>Cửa hàng</th><th>Doanh thu</th><th>%</th></tr>';
      rows=SA.list.map(function(c,i){return '<tr><td class="name"><span class="dot" style="background:'+colorOf(c.name,i)+'"></span>'+c.name+'</td><td>'+vnd(c.revenue)+'</td><td>'+c.share+'%</td></tr>';}).join('')||'<tr><td colspan="3" class="note">Không có dữ liệu</td></tr>';
      mixL=SA.list.map(function(c){return c.name;});mixV=SA.list.map(function(c){return c.revenue;});mixC=SA.list.map(function(c,i){return colorOf(c.name,i);});
      leg='';
    } else {
      var C=onlineAgg(slice);
      bdT='Đơn Online theo nguồn / kênh';mixT='Cơ cấu nguồn Online';
      head='<tr><th>Nguồn</th><th>Đơn</th><th>Doanh thu</th><th>AOV</th><th>%</th></tr>';
      rows=C.list.map(function(c,i){return '<tr><td class="name"><span class="dot" style="background:'+colorOf(c.name,i)+'"></span>'+c.name+'</td><td>'+c.orders+'</td><td>'+vnd(c.revenue)+'</td><td>'+vnd(c.aov)+'</td><td>'+c.share+'%</td></tr>';}).join('')||'<tr><td colspan="5" class="note">Không có đơn online trong kỳ</td></tr>';
      mixL=C.list.map(function(c){return c.name;});mixV=C.list.map(function(c){return c.revenue;});mixC=C.list.map(function(c,i){return colorOf(c.name,i);});
      leg=C.list.map(function(c,i){return '<span><span class="dot" style="background:'+colorOf(c.name,i)+'"></span>'+c.name+' '+c.share+'%</span>';}).join('');
    }
    document.getElementById('bdTitle').textContent=bdT;
    document.getElementById('mixTitle').textContent=mixT;
    document.querySelector('#bdTable thead').innerHTML=head;
    document.querySelector('#bdTable tbody').innerHTML=rows;
    document.getElementById('legMix').innerHTML=leg;
    drawDonut('cMix',mixL,mixV,mixC);

    // Store panel (chi all/Bemori)
    var sp=document.getElementById('storePanel');
    if(!showStore){sp.style.display='none';}
    else {sp.style.display='block';var sb=storeAgg(slice).list;document.getElementById('storeWrap').style.height=(Math.max(sb.length,1)*34+70)+'px';
      drawBar('cStore',sb.map(function(s){return s.name;}),sb.map(function(s){return s.revenue;}),'#1D9E75');}
  }

  function drawDonut(id,labels,vals,colors){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+': '+full(c.parsed);}}}}}});}
  function drawBar(id,labels,vals,color){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{data:vals,backgroundColor:color,borderRadius:4,barThickness:20}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return full(c.parsed.x);}}}},scales:{x:{grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}},y:{grid:{display:false}}}}});}
  function drawStacked(id,labels,series){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:series},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+full(c.parsed.y);}}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}}}}});}

  function bindSeg(id,attr,setter){document.getElementById(id).addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;this.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');setter(b.getAttribute(attr));render();});}
  bindSeg('segScope','data-s',function(v){scope=v;});
  bindSeg('segGran','data-g',function(v){gran=v;});
  var fromI=document.getElementById('dFrom'),toI=document.getElementById('dTo'),cr=document.getElementById('customRange');
  var minD=D.daily[0]?D.daily[0].day:'',maxD=D.daily.length?D.daily[D.daily.length-1].day:'';
  [fromI,toI].forEach(function(i){i.min=minD;i.max=maxD;});
  fromI.value=D.daily.length>30?D.daily[D.daily.length-30].day:minD;toI.value=maxD;cFrom=fromI.value;cTo=toI.value;
  document.getElementById('periodSel').addEventListener('change',function(){period=this.value;cr.style.display=period==='custom'?'inline-flex':'none';render();});
  fromI.addEventListener('change',function(){cFrom=this.value;if(period==='custom')render();});
  toI.addEventListener('change',function(){cTo=this.value;if(period==='custom')render();});

  function fmtD(d){return d.split('-').reverse().join('/');}
  function rangeLabel(){var s=sliceFor(period);
    if(!s.length){if(period==='today'){var t=new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);return fmtD(t)+' · chưa có dữ liệu (cập nhật trong ngày)';}return '(không có dữ liệu)';}
    var a=s[0].day,b=s[s.length-1].day;return a===b?fmtD(a):fmtD(a)+' → '+fmtD(b);}
  var _r=render;render=function(){_r();document.getElementById('sub').textContent=rangeLabel();};
  document.getElementById('foot').textContent='Cập nhật '+new Date(D.generatedAt).toLocaleString('vi-VN');
  render();
})();
</script>
</body>
</html>
