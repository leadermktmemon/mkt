<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memon · Dashboard</title>
<style>
  :root{ --bg:#f2f6f8; --card:#fff; --ink:#1a1c1f; --muted:#6b7280; --line:#e6e8eb; --brand:#15A9D6; --brand-dark:#0E8AB4; --brand-soft:#e7f6fb; --pink:#F2709E; --pink-soft:#fdeef4; --blue:#15A9D6; --teal:#1D9E75; --amber:#BA7517; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 48px;}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logoimg{height:54px;width:auto;display:block;}
  .logoMark{font-size:30px;font-weight:800;color:var(--brand);letter-spacing:-1px;font-family:"Segoe UI Rounded","Nunito","Segoe UI",-apple-system,sans-serif;line-height:1;}
  .logoMark sup{font-size:12px;top:-0.9em;}
  .brandtext h1{font-size:18px;margin:0;font-weight:700;color:var(--ink);letter-spacing:-0.3px;}
  .tagline{font-size:12px;color:var(--pink);font-weight:600;margin-top:2px;}
  .sub{font-size:13px;color:var(--muted);font-weight:500;}
  .brandbar{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--brand) 0%,var(--pink) 100%);margin:0 0 18px;}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:18px;}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap;}
  .seg button{border:0;background:transparent;padding:8px 13px;font-size:13px;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--blue);color:#fff;font-weight:600;}
  .seg .lbl{padding:8px 10px;font-size:12px;color:var(--muted);border-right:1px solid var(--line);align-self:center;}
  .ctl{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px 10px;}
  .ctl .lbl{font-size:12px;color:var(--muted);}
  select,input[type=date]{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);cursor:pointer;}
  select{border:0;padding:6px 4px;font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;margin-bottom:18px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .kpi.accent{border-color:var(--blue);border-width:2px;}
  .kpi .label{font-size:13px;color:var(--muted);margin-bottom:6px;}
  .kpi .val{font-size:25px;font-weight:700;letter-spacing:-0.5px;}
  /* The so sanh tach biet (moi muc 1 the) */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:14px;margin-bottom:18px;}
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;border-top:3px solid var(--line);}
  .ctitle{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .cmain{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin:2px 0 12px;}
  .cmain small{font-size:12px;font-weight:500;color:var(--muted);margin-left:4px;}
  .cmetrics{display:grid;grid-template-columns:1fr 1fr;gap:5px 16px;}
  .cm{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;border-top:1px solid var(--line);padding-top:5px;}
  .cm span{color:var(--muted);}
  .cm b{font-weight:600;}
  .cm b.mut{color:var(--muted);font-weight:500;font-style:italic;}
  .grid2{display:grid;grid-template-columns:1.15fr 0.85fr;gap:16px;margin-bottom:16px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .panel h2{font-size:15px;font-weight:600;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:var(--muted);}
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .cw{position:relative;width:100%;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:right;padding:8px 6px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  th{color:var(--muted);font-weight:500;}
  td.name{display:flex;align-items:center;gap:8px;}
  .note{font-size:13px;color:var(--muted);padding:8px 0;}
  td.mut,span.mut{color:var(--muted);}
  footer{margin-top:24px;font-size:12px;color:var(--muted);text-align:center;}
  @media(max-width:760px){.grid2{grid-template-columns:1fr;}}
  .cgrow{display:inline-block;font-size:11px;font-weight:600;padding:2px 6px;border-radius:20px;margin-left:4px;vertical-align:middle;}
  .cgrow.up{background:#dcfce7;color:#15803d;}
  .cgrow.dn{background:#fee2e2;color:#dc2626;}
  .cgrow.nt{background:#f3f4f6;color:#6b7280;}
  .cgrow.yoy{background:#fef3c7;color:#92400e;}
  .cgrow.yoy.dn{background:#fce7f3;color:#9d174d;}
  .cgrow.yoy.nt{background:#f3f4f6;color:#6b7280;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="logo.png" alt="Memon" class="logoimg" onerror="this.outerHTML='<span class=\'logoMark\'>Memon<sup>®</sup></span>'">
      <div class="brandtext">
        <h1>Marketing Report</h1>
        <div class="tagline">Trao cảm xúc · Gửi yêu thương 🧸</div>
      </div>
    </div>
    <div class="sub" id="sub"></div>
  </header>
  <div class="brandbar"></div>

  <div class="controls">
    <div class="seg" id="segGroup">
      <span class="lbl">Nhóm</span>
      <button data-grp="1" class="on">1 · Doanh Số</button>
      <button data-grp="2">2 · Campaign</button>
      <button data-grp="3">3 · Theo kênh</button>
    </div>
    <div class="ctl">
      <span class="lbl">Kỳ</span>
      <select id="periodSel">
        <option value="today">Hôm nay</option>
        <option value="thisweek">Tuần này</option>
        <option value="lastweek">Tuần trước</option>
        <option value="7">7 ngày qua</option>
        <option value="30" selected>30 ngày qua</option>
        <option value="month">Tháng này</option>
        <option value="90">90 ngày qua</option>
        <option value="365">1 năm qua</option>
        <option value="custom">Chọn ngày…</option>
      </select>
      <span id="customRange" style="display:none;align-items:center;gap:6px;">
        <input type="date" id="dFrom"> <span style="color:var(--muted);">→</span> <input type="date" id="dTo">
      </span>
    </div>
    <div class="seg" id="segGran">
      <span class="lbl">Gộp</span>
      <button data-g="day" class="on">Ngày</button>
      <button data-g="week">Tuần</button>
      <button data-g="month">Tháng</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="panel" id="trendPanel" style="margin-bottom:16px;">
    <h2><span id="trendTitle">Xu hướng doanh thu</span><span id="granLabel" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div class="legend" id="legTrend"></div>
    <div class="cw" style="height:300px;"><canvas id="cTrend"></canvas></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2 id="bdTitle">Theo nguồn / kênh</h2>
      <table id="bdTable"><thead></thead><tbody></tbody></table>
      <div class="note" id="bdNote" style="display:none;"></div>
    </div>
    <div class="panel">
      <h2 id="mixTitle">Cơ cấu</h2>
      <div class="legend" id="legMix"></div>
      <div class="cw" style="height:230px;"><canvas id="cMix"></canvas></div>
    </div>
  </div>

  <div class="panel" id="storePanel">
    <h2>Doanh thu theo cửa hàng <span style="font-size:12px;color:var(--muted);font-weight:400;">(bán lẻ tại quầy)</span></h2>
    <div class="cw" id="storeWrap" style="height:420px;"><canvas id="cStore"></canvas></div>
  </div>

  <div class="panel" id="campaignPanel" style="display:none;margin-bottom:16px;">
    <h2 style="display:flex;justify-content:space-between;align-items:center;">Chiến dịch Facebook <span id="campPeriod" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <select id="campStatusFilter" style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
        <option value="">Tất cả trạng thái</option>
        <option value="ACTIVE">Đang chạy (ACTIVE)</option>
        <option value="PAUSED">Đã dừng (PAUSED)</option>
        <option value="ARCHIVED">Đã lưu trữ</option>
      </select>
      <select id="campEffFilter" style="font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
        <option value="">Tất cả hiệu quả</option>
        <option value="good">🟢 Tốt</option>
        <option value="ok">🟡 Khá</option>
        <option value="poor">🔴 Kém / Đắt</option>
        <option value="none">⚪ Chưa đo</option>
      </select>
      <span id="campSummary" style="font-size:13px;color:var(--muted);"></span>
    </div>
    <div id="campBody"></div>
    <div class="note" id="campNote" style="margin-top:10px;"></div>
  </div>

  <footer id="foot"></footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<script>
(function(){
  var D=window.DASHBOARD_DATA; if(!D||!D.daily){document.getElementById('sub').textContent='Không tìm thấy data.js';return;}
  var PALETTE={'FB Bemori':'#378ADD','Facebook':'#378ADD','Zalo Bemori':'#1D9E75','Zalo cá nhân':'#1D9E75','Admin':'#888780','Khách lẻ':'#888780','Shopee':'#D85A30','Instagram':'#D4537E','Insta Bemori':'#D4537E','Zalo OA':'#BA7517','Website':'#7F77DD','Web Bemori':'#7F77DD'};
  var FB=['#378ADD','#1D9E75','#D85A30','#D4537E','#BA7517','#7F77DD','#888780','#26215C','#0F6E56','#993C1D'];
  var colorOf=function(n,i){return PALETTE[n]||FB[i%FB.length];};
  function vnd(n){n=Math.round(n); if(n>=1e9)return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+' tỷ'; if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' tr'; if(n>=1e3)return Math.round(n/1e3)+'K'; return String(n);}
  var full=function(n){return Math.round(n).toLocaleString('vi-VN')+'đ';};
  Chart.defaults.color='#6b7280'; Chart.defaults.font.family='inherit'; var grid='rgba(0,0,0,0.06)';
  var COL={'Bemori':'#378ADD','Memon':'#7F77DD','Online':'#378ADD','Cửa hàng':'#1D9E75','Teddy':'#D4537E','Khác':'#888780','GBO/NNGB':'#BA7517','Facebook':'#378ADD','Instagram':'#D4537E','Zalo':'#1D9E75','Website':'#7F77DD','Bán lẻ NK':'#888780','Ads':'#D85A30','Tự nhiên / Viral':'#1D9E75'};
  var COST='— (chờ ads)';

  var group='1', period='30', gran='day', cFrom=null, cTo=null, charts={};

  // ---- URL hash state (F5 / chia se link giu nguyen bo loc) ----
  function pushURL(){var p=new URLSearchParams();p.set('g',group);p.set('p',period);p.set('gr',gran);if(period==='custom'){if(cFrom)p.set('f',cFrom);if(cTo)p.set('t',cTo);}var sf=document.getElementById('campStatusFilter').value,ef=document.getElementById('campEffFilter').value;if(sf)p.set('sf',sf);if(ef)p.set('ef',ef);history.replaceState(null,'','#'+p.toString());}
  function loadURL(){if(!location.hash)return;var p=new URLSearchParams(location.hash.slice(1));if(p.get('g'))group=p.get('g');if(p.get('p')){period=p.get('p');document.getElementById('periodSel').value=period;}if(p.get('gr'))gran=p.get('gr');if(p.get('f')){cFrom=p.get('f');document.getElementById('dFrom').value=cFrom;}if(p.get('t')){cTo=p.get('t');document.getElementById('dTo').value=cTo;}if(period==='custom')document.getElementById('customRange').style.display='inline-flex';document.querySelectorAll('#segGroup button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-grp')===group);});document.querySelectorAll('#segGran button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-g')===gran);});var sf=p.get('sf'),ef=p.get('ef');if(sf)document.getElementById('campStatusFilter').value=sf;if(ef)document.getElementById('campEffFilter').value=ef;}

  function sliceFor(p){ var d=D.daily; if(!d.length)return [];
    if(p==='7')return d.slice(-7); if(p==='30')return d.slice(-30);
    if(p==='90')return d.slice(-90); if(p==='365')return d.slice(-365);
    if(p==='today'){var t=new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);return d.filter(function(x){return x.day===t;});}
    if(p==='thisweek'){var nw=new Date(Date.now()+7*3600*1000);var dw=nw.getUTCDay();var off=dw===0?6:dw-1;var mon=new Date(nw.getTime()-off*86400000).toISOString().slice(0,10);var tod=nw.toISOString().slice(0,10);return d.filter(function(x){return x.day>=mon&&x.day<=tod;});}
    if(p==='lastweek'){var nw2=new Date(Date.now()+7*3600*1000);var dw2=nw2.getUTCDay();var off2=dw2===0?6:dw2-1;var thisMon=new Date(nw2.getTime()-off2*86400000);var lMon=new Date(thisMon.getTime()-7*86400000).toISOString().slice(0,10);var lSun=new Date(thisMon.getTime()-86400000).toISOString().slice(0,10);return d.filter(function(x){return x.day>=lMon&&x.day<=lSun;});}
    if(p==='month'){var m=d[d.length-1].day.slice(0,7);return d.filter(function(x){return x.day.slice(0,7)===m;});}
    if(p==='custom')return d.filter(function(x){return (!cFrom||x.day>=cFrom)&&(!cTo||x.day<=cTo);});
    return d; }

  function detectProduct(n){n=(n||'').toLowerCase();if(/bemori/.test(n))return'Bemori';if(/teddy|kid/.test(n))return'Teddy';if(/gbo|gấu bông|nngb|ngôi nhà/.test(n))return'GBO/NNGB';if(/memon/.test(n))return'Memon';return'Khác';}
  function prevSliceFor(p){var cur=sliceFor(p);if(!cur.length)return [];var d=D.daily;var first=cur[0].day;var fi=d.findIndex(function(x){return x.day===first;});var n=cur.length;if(fi<n)return [];return d.slice(fi-n,fi);}
  function growBadge(curr,prev){if(!prev)return '';var p=Math.round((curr-prev)/prev*100);if(p>0)return '<span class="cgrow up">+'+p+'%</span>';if(p<0)return '<span class="cgrow dn">'+p+'%</span>';return '<span class="cgrow nt">0%</span>';}
  function yoySliceFor(p){var cur=sliceFor(p);if(!cur.length)return [];var d=D.daily;var ms=365*86400000;var f=new Date(cur[0].day+'T00:00:00Z').getTime()-ms;var l=new Date(cur[cur.length-1].day+'T00:00:00Z').getTime()-ms;var fs=new Date(f).toISOString().slice(0,10),ls=new Date(l).toISOString().slice(0,10);return d.filter(function(x){return x.day>=fs&&x.day<=ls;});}
  function yoyBadge(curr,yoy){if(!yoy)return '';var p=Math.round((curr-yoy)/yoy*100);if(p>0)return '<span class="cgrow yoy">+'+p+'% YoY</span>';if(p<0)return '<span class="cgrow yoy dn">'+p+'% YoY</span>';return '<span class="cgrow yoy nt">0% YoY</span>';}

  function sumOnline(s){var r=0;s.forEach(function(d){r+=d.onlineRev||0;});return r;}
  function sumStore(s){var r=0;s.forEach(function(d){r+=d.storeRev||0;});return r;}
  function sumStoreOnline(s){var r=0;s.forEach(function(d){r+=d.storeOnline||0;});return r;}
  function sumF(s,k){var r=0;s.forEach(function(d){r+=d[k]||0;});return r;}
  function sumMemon(s){var r=0;s.forEach(function(d){r+=d.memonRev||0;});return r;}
  // Online: doanh thu tong + so don lay tu bang 2.2 (chinh xac, ko tre). Ty trong kenh lay tu 3.1.
  // So don/AOV theo kenh = UOC LUONG theo ty trong doanh thu (Base khong nhap so don theo kenh).
  function onlineAgg(s){var chRaw={},total=0,orders=0;s.forEach(function(d){total+=d.onlineRev||0;orders+=d.onlineOrders||0;for(var k in d.online){chRaw[k]=(chRaw[k]||0)+d.online[k].rev;}});
    var sumCh=0;for(var k in chRaw)sumCh+=chRaw[k];if(!sumCh)sumCh=1;
    var list=Object.keys(chRaw).sort(function(a,b){return chRaw[b]-chRaw[a];}).map(function(n){var share=chRaw[n]/sumCh;var rev=total*share;var ord=Math.round(orders*share);return {name:n,orders:ord,revenue:rev,aov:ord?Math.round(rev/ord):0,share:Math.round(share*100)};});
    return {list:list,total:total,orders:orders,aov:orders?Math.round(total/orders):0};}
  function storeAgg(s){var st={},total=0;s.forEach(function(d){for(var k in d.store){st[k]=(st[k]||0)+d.store[k];total+=d.store[k];}});
    return {list:Object.keys(st).sort(function(a,b){return st[b]-st[a];}).map(function(n){return {name:n,revenue:st[n],share:total?Math.round(st[n]/total*100):0};}),total:total};}
  function memonAgg(s){var dset={};s.forEach(function(d){dset[d.day]=1;});var cust={},total=0,bills=0;(D.memonBills||[]).forEach(function(b){if(dset[b.day]){cust[b.customer]=cust[b.customer]||{rev:0,n:0};cust[b.customer].rev+=b.amount;cust[b.customer].n++;total+=b.amount;bills++;}});
    return {list:Object.keys(cust).sort(function(a,b){return cust[b].rev-cust[a].rev;}).map(function(n){return {name:n,orders:cust[n].n,revenue:cust[n].rev,share:total?Math.round(cust[n].rev/total*100):0};}),total:total,bills:bills,customers:Object.keys(cust).length};}
  function bucketKey(day,g){if(g==='month')return day.slice(0,7);if(g==='week'){var d=new Date(day+'T00:00:00Z');var dow=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-dow);return d.toISOString().slice(0,10);}return day;}
  // Nhom 2: doanh thu theo thuong hieu (cot 3.1)
  function brandsAgg(s){var b={},total=0;s.forEach(function(d){for(var k in (d.brands||{})){b[k]=(b[k]||0)+d.brands[k];total+=d.brands[k];}});
    return {list:Object.keys(b).sort(function(a,c){return b[c]-b[a];}).map(function(n){return {name:n,revenue:b[n],share:total?Math.round(b[n]/total*100):0};}),total:total};}
  // Nhom 3: ma tran thuong hieu x kenh (cot 3.1)
  function bcAgg(s){var m={},chSet={},brT={},chT={},tot=0;s.forEach(function(d){for(var b in (d.bc||{})){m[b]=m[b]||{};for(var c in d.bc[b]){m[b][c]=(m[b][c]||0)+d.bc[b][c];chSet[c]=1;brT[b]=(brT[b]||0)+d.bc[b][c];chT[c]=(chT[c]||0)+d.bc[b][c];tot+=d.bc[b][c];}}});
    var chans=Object.keys(chSet).sort(function(a,c){return chT[c]-chT[a];});
    var brs=Object.keys(m).sort(function(a,c){return (brT[c]||0)-(brT[a]||0);});
    return {matrix:m,channels:chans,brands:brs,brandTot:brT,chanTot:chT,total:tot};}
  // Nhom 4: ads vs tu nhien/viral (cot 3.1) + doanh thu kenh tho
  function adsAgg(s){var fb=0,gg=0,so=0;s.forEach(function(d){fb+=d.fbAds||0;gg+=d.ggAds||0;so+=d.social||0;});return {ads:fb+gg,fb:fb,gg:gg,organic:so,total:fb+gg+so};}
  function metaAgg(s){var fb=0,ig=0,tot=0,igPx=0;s.forEach(function(d){fb+=d.metaFb||0;ig+=d.metaIg||0;tot+=d.metaTotal||0;igPx+=d.metaIgPixelRev||0;});return {fb:fb,ig:ig,total:tot,igPixelRev:igPx};}
  function roasFmt(rev,cost){if(!cost)return '—';var r=rev/cost;return (r>=10?r.toFixed(0):(r>=1?r.toFixed(1):r.toFixed(2))).replace(/\.?0+$/,'')+'x';}
  function chanRaw(s){var ch={};s.forEach(function(d){for(var k in d.online)ch[k]=(ch[k]||0)+d.online[k].rev;});return ch;}
  function bcRaw(s){var m={};s.forEach(function(d){for(var b in (d.bc||{})){m[b]=m[b]||{};for(var c in d.bc[b])m[b][c]=(m[b][c]||0)+d.bc[b][c];}});return m;}
  // Khung 9 kenh noi dung (theo anh phan bo): {tuyen, ten, dinh vi, lay doanh thu tu dau, muc tieu noi dung/thang}
  var N4=[
    {line:'Cố định',name:'Website Bemori',pos:'SEO blog',rev:function(c,m){return c['Website']||0;},target:'~50–80 bài'},

      // --- Brand section ---
      var bCPMs=bShown.impressions?Math.round(bShown.spend/bShown.impressions*1000):0;
      html+='<div style="margin-bottom:20px"><div style="display:flex;justify-content:space-between;align-items:baseline;padding-bottom:6px;border-bottom:2px solid #378ADD;margin-bottom:10px">';
      html+='<span style="font-weight:700;font-size:13px;color:#378ADD">📣 Branding — Tương tác · View · Like · Nhận diện'+efSuffix+'</span>';
      html+='<span style="font-size:11px;color:var(--muted)">'+brandC.length+' camp · Chi: '+vnd(bShown.spend)+' · Hiển thị: '+imprFmt(bShown.impressions)+' · Tương tác: '+imprFmt(bShown.engagement)+(bCPMs?' · CPM: '+vnd(bCPMs):'')+'</span></div>';
      html+=secTable(brandC,true)+'</div>';
      // --- Conversion section ---
      var cvROAS=cvShown.purchaseValue&&cvShown.spend?Math.round(cvShown.purchaseValue/cvShown.spend*10)/10:0;
      html+='<div><div style="display:flex;justify-content:space-between;align-items:baseline;padding-bottom:6px;border-bottom:2px solid #1D9E75;margin-bottom:10px">';
      html+='<span style="font-weight:700;font-size:13px;color:#1D9E75">🎯 Doanh số — Mess · Lead · Mua'+efSuffix+'</span>';
      html+='<span style="font-size:11px;color:var(--muted)">'+convC.length+' camp · Chi: '+vnd(cvShown.spend)+' · Mess: '+cvShown.messages+' · Lead: '+cvShown.leads+' · Mua: '+cvShown.purchases+(cvROAS?' · ROAS: '+cvROAS.toFixed(1)+'x':'')+'</span></div>';
      html+=secTable(convC,false)+'</div>';
      if(!campsAgg.length) html='<p class="note" style="text-align:center;padding:24px">Chưa có dữ liệu. Chạy <code>node meta-fetch.mjs</code> để cập nhật.</p>';
      document.getElementById('campBody').innerHTML=html;
      document.getElementById('campNote').innerHTML='Phân loại theo CPM: Branding hiển thị rộng/rẻ (CPM &lt; 20K) — đo bằng hiển thị &amp; tương tác, KHÔNG tính ROAS. Doanh số nhắm tệp hẹp (CPM ≥ 20K) — ROAS = DT pixel ÷ chi phí Doanh số (KHÔNG gồm chi phí Branding). CPM = Chi/1000 hiển thị · CPE = Chi/tương tác · CPL = Chi/lead · CPO = Chi/đơn.';
      keys=['Meta FB','Meta IG'];valFn=function(d){return{'Meta FB':d.metaFb||0,'Meta IG':d.metaIg||0};};
      trendTitle='Chi phí Meta theo ngày';
    }
    else {
      // ===== NHOM 3: Theo kenh — hieu qua tung kenh =====
      var chRaw3={};slice.forEach(function(d){for(var k in d.online)chRaw3[k]=(chRaw3[k]||0)+d.online[k].rev;});
      var chRawP3={};prev.forEach(function(d){for(var k in d.online)chRawP3[k]=(chRawP3[k]||0)+d.online[k].rev;});
      var fbTot3=chRaw3['Facebook']||0,fbTotP3=chRawP3['Facebook']||0;
      var igRev3=chRaw3['Instagram']||0,igRevP3=chRawP3['Instagram']||0;
      var zRev3=chRaw3['Zalo']||0,zRevP3=chRawP3['Zalo']||0;
      var wRev3=chRaw3['Website']||0,wRevP3=chRawP3['Website']||0;
      var blRev3=chRaw3['Bán lẻ NK']||0,blRevP3=chRawP3['Bán lẻ NK']||0;
      cards=[
        {title:'Facebook Ads',color:'#378ADD',main:vnd(AD.fb)+growBadge(AD.fb,ADp.fb)+yoyBadge(AD.fb,ADyoy.fb),sub:MA.fb?'ROAS '+roasFmt(AD.fb,MA.fb):'chờ chi phí',metrics:[
          m('Chi phí Meta FB',MA.fb?vnd(MA.fb):COST,!MA.fb),m('ROAS',MA.fb?roasFmt(AD.fb,MA.fb):'—',!MA.fb)]},
        {title:'Instagram',color:'#D4537E',main:vnd(igRev3)+growBadge(igRev3,igRevP3)+yoyBadge(igRev3,yoy.length?(function(){var r=0;yoy.forEach(function(d){r+=(d.online&&d.online['Instagram']?d.online['Instagram'].rev:0);});return r;})():0),sub:MA.ig?(MA.igPixelRev?'ROAS pixel '+roasFmt(MA.igPixelRev,MA.ig):'ROAS kênh '+roasFmt(igRev3,MA.ig)):'chờ chi phí',metrics:[
          m('Chi phí Meta IG',MA.ig?vnd(MA.ig):COST,!MA.ig),m('ROAS (pixel)',MA.igPixelRev?roasFmt(MA.igPixelRev,MA.ig):'—',!MA.igPixelRev),m('DT kênh IG',vnd(igRev3))]},
        {title:'Zalo',color:'#1D9E75',main:vnd(zRev3)+growBadge(zRev3,zRevP3)+yoyBadge(zRev3,yoy.length?(function(){var r=0;yoy.forEach(function(d){r+=(d.online&&d.online['Zalo']?d.online['Zalo'].rev:0);});return r;})():0),sub:Math.round(zRev3/(on||1)*100)+'% online',metrics:[
          m('Chi phí','— (Google Ads sau)',1),m('ROAS','∞ (0 spend)',0)]},
      ];
      keys=['FB Ads','Instagram','Zalo','Website','Social','Bán lẻ NK'];
      valFn=function(d){return{'FB Ads':d.fbAds||0,'Instagram':d.online&&d.online['Instagram']?d.online['Instagram'].rev:0,'Zalo':d.online&&d.online['Zalo']?d.online['Zalo'].rev:0,'Website':d.online&&d.online['Website']?d.online['Website'].rev:0,'Social':d.social||0,'Bán lẻ NK':d.online&&d.online['Bán lẻ NK']?d.online['Bán lẻ NK'].rev:0};};
      trendTitle='Xu hướng theo kênh';
      var chanRows3=[
        {name:'Facebook Ads',rev:AD.fb,revP:ADp.fb,cost:MA.fb,roas:MA.fb&&AD.fb?AD.fb/MA.fb:null,col:'#378ADD'},
        {name:'Instagram',rev:igRev3,revP:igRevP3,cost:MA.ig,roas:MA.ig&&MA.igPixelRev?MA.igPixelRev/MA.ig:null,col:'#D4537E'},
        {name:'Zalo',rev:zRev3,revP:zRevP3,cost:0,roas:null,col:'#1D9E75'},
        {name:'Website',rev:wRev3,revP:wRevP3,cost:0,roas:null,col:'#7F77DD'},
        {name:'Social tự nhiên',rev:AD.organic,revP:ADp.organic,cost:0,roas:null,col:'#888780',noAds:true},
        {name:'Bán lẻ NK',rev:blRev3,revP:blRevP3,cost:0,roas:null,col:'#BA7517'},
        {name:'Facebook (kênh DM)',rev:fbTot3,revP:fbTotP3,cost:0,roas:null,col:'#a0c4f5',ital:true,noAds:true},
      ];
      chanRows3.sort(function(a,b){return b.rev-a.rev;});
      var chTot3=on||1;
      head='<tr><th>Kênh</th><th>Doanh thu</th><th>vs kỳ trước</th><th>Chi phí</th><th>ROAS</th><th>%</th></tr>';
      rows=chanRows3.map(function(r){var rs=r.roas!=null?(r.roas>=10?Math.round(r.roas)+'x':r.roas.toFixed(1).replace(/\.0$/,'')+'x'):'—';var rc=r.roas!=null?(r.roas>=5?'#15803d':r.roas>=2?'#378ADD':'#dc2626'):'';return '<tr'+(r.ital?' style="opacity:0.6"':'')+'>'+
        '<td class="name"><span class="dot" style="background:'+r.col+'"></span>'+r.name+'</td>'+
        '<td>'+vnd(r.rev)+'</td><td>'+growBadge(r.rev,r.revP)+'</td>'+
        '<td'+(r.cost?'':' class="mut"')+'>'+(r.cost?vnd(r.cost):r.noAds?'—':COST)+'</td>'+
        '<td'+(r.roas==null?' class="mut"':' style="font-weight:600;color:'+rc+'"')+'>'+rs+'</td>'+
        '<td>'+Math.round(r.rev/chTot3*100)+'%</td></tr>';}).join('');
      bdT='Hiệu quả theo kênh';mixT='Cơ cấu kênh Online';
      mixL=['FB Ads','Instagram','Zalo','Website','Social','Bán lẻ NK'];
      mixV=[AD.fb,igRev3,zRev3,wRev3,AD.organic,blRev3];
      mixC=['#378ADD','#D4537E','#1D9E75','#7F77DD','#888780','#BA7517'];
      leg=mixL.map(function(l,i){return '<span><span class="dot" style="background:'+mixC[i]+'"></span>'+l+'</span>';}).join('');
      bdNote='ROAS FB Ads = DT attribution Lark / Chi phí Meta FB. ROAS IG = DT pixel Meta / Chi phí IG Ads (tự động). "Facebook (kênh DM)" (mờ) = đơn chat qua FB page — khác FB Ads vì nhiều khách click ad rồi nhắn Zalo.';
    }

    // ---- The so sanh tach biet ----
    document.getElementById('cards').innerHTML=cards.map(function(c){return '<div class="ccard" style="border-top-color:'+c.color+'"><div class="ctitle"><span class="dot" style="background:'+c.color+'"></span>'+c.title+'</div><div class="cmain">'+c.main+(c.sub?' <small>'+c.sub+'</small>':'')+'</div><div class="cmetrics">'+c.metrics.map(function(x){return '<div class="cm"><span>'+x.label+'</span><b'+(x.muted?' class="mut"':'')+'>'+x.val+'</b></div>';}).join('')+'</div></div>';}).join('');

    // ---- Trend (chung) ----
    var idx={},buckets=[];
    slice.forEach(function(d){var key=bucketKey(d.day,gran);if(idx[key]===undefined){idx[key]=buckets.length;buckets.push({key:key,t:{}});}var bk=buckets[idx[key]];var v=valFn(d);keys.forEach(function(t){bk.t[t]=(bk.t[t]||0)+(v[t]||0);});});
    var tSeries=keys.filter(function(t){return buckets.some(function(x){return x.t[t];});}).map(function(t,i){return {label:t,data:buckets.map(function(x){return Math.round(x.t[t]||0);}),backgroundColor:COL[t]||colorOf(t,i),stack:'x',borderRadius:2};});
    document.getElementById('trendTitle').textContent=trendTitle;
    document.getElementById('granLabel').textContent='(theo '+(gran==='day'?'ngày':gran==='week'?'tuần':'tháng')+')';
    document.getElementById('legTrend').innerHTML=tSeries.map(function(s){return '<span><span class="dot" style="background:'+s.backgroundColor+'"></span>'+s.label+'</span>';}).join('');
    drawStacked('cTrend',buckets.map(function(x){return gran==='month'?x.key:x.key.slice(5);}),tSeries);

    // ---- Breakdown + mix (nhom 1-3) ----
    if(P.grid2.style.display!=='none'){
      document.getElementById('bdTitle').textContent=bdT;
      document.getElementById('mixTitle').textContent=mixT;
      document.querySelector('#bdTable thead').innerHTML=head;
      document.querySelector('#bdTable tbody').innerHTML=rows;
      var bn=document.getElementById('bdNote');bn.textContent=bdNote;bn.style.display=bdNote?'block':'none';
      document.getElementById('legMix').innerHTML=leg;
      drawDonut('cMix',mixL,mixV,mixC);
    }
  }

  function drawDonut(id,labels,vals,colors){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+': '+full(c.parsed);}}}}}});}
  function drawBar(id,labels,vals,color){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{data:vals,backgroundColor:color,borderRadius:4,barThickness:20}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return full(c.parsed.x);}}}},scales:{x:{grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}},y:{grid:{display:false}}}}});}
  function drawStacked(id,labels,series){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:series},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+full(c.parsed.y);}}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}}}}});}

  function bindSeg(id,attr,setter){document.getElementById(id).addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;this.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');setter(b.getAttribute(attr));render();});}
  bindSeg('segGroup','data-grp',function(v){group=v;});
  bindSeg('segGran','data-g',function(v){gran=v;});
  var fromI=document.getElementById('dFrom'),toI=document.getElementById('dTo'),cr=document.getElementById('customRange');
  var minD=D.daily[0]?D.daily[0].day:'',maxD=D.daily.length?D.daily[D.daily.length-1].day:'';
  [fromI,toI].forEach(function(i){i.min=minD;i.max=maxD;});
  fromI.value=D.daily.length>30?D.daily[D.daily.length-30].day:minD;toI.value=maxD;cFrom=fromI.value;cTo=toI.value;
  document.getElementById('periodSel').addEventListener('change',function(){period=this.value;cr.style.display=period==='custom'?'inline-flex':'none';render();});
  fromI.addEventListener('change',function(){cFrom=this.value;if(period==='custom')render();});
  toI.addEventListener('change',function(){cTo=this.value;if(period==='custom')render();});
  document.getElementById('campStatusFilter').addEventListener('change',function(){render();});
  document.getElementById('campEffFilter').addEventListener('change',function(){render();});
  window.setCampEff=function(v){document.getElementById('campEffFilter').value=v;render();};

  function fmtD(d){return d.split('-').reverse().join('/');}
  function rangeLabel(){var s=sliceFor(period);
    if(!s.length){if(period==='today'){var t=new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);return fmtD(t)+' · chưa có dữ liệu (cập nhật trong ngày)';}return '(không có dữ liệu)';}
    var a=s[0].day,b=s[s.length-1].day;return a===b?fmtD(a):fmtD(a)+' → '+fmtD(b);}
  var _r=render;render=function(){_r();document.getElementById('sub').textContent=rangeLabel();pushURL();};
  document.getElementById('foot').innerHTML='<b style="color:var(--brand)">Memon<sup>®</sup></b> · Gấu bông cao cấp — Trao cảm xúc, gửi yêu thương · Cập nhật '+new Date(D.generatedAt).toLocaleString('vi-VN');
  loadURL();
  render();
})();
</script>
</body>
</html>
