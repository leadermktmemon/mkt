<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bemori · Dashboard Marketing</title>
<style>
  :root{ --bg:#f4f5f7; --card:#fff; --ink:#1a1c1f; --muted:#6b7280; --line:#e6e8eb; --blue:#378ADD; --teal:#1D9E75; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 48px;}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .logo{width:42px;height:42px;border-radius:10px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;}
  h1{font-size:20px;margin:0;font-weight:600;}
  .sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .controls{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-bottom:18px;}
  .seg{display:inline-flex;background:#e9eb0;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{border:0;background:transparent;padding:8px 14px;font-size:13px;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--blue);color:#fff;font-weight:600;}
  .seg .lbl{padding:8px 10px;font-size:12px;color:var(--muted);border-right:1px solid var(--line);align-self:center;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;margin-bottom:18px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .kpi.accent{border-color:var(--blue);border-width:2px;}
  .kpi .label{font-size:13px;color:var(--muted);margin-bottom:6px;}
  .kpi .val{font-size:25px;font-weight:700;letter-spacing:-0.5px;}
  .secTitle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:28px 0 12px;}
  .secTitle::after{content:"";flex:1;height:1px;background:var(--line);}
  .grid2{display:grid;grid-template-columns:1.15fr 0.85fr;gap:16px;margin-bottom:16px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .panel h2{font-size:15px;font-weight:600;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:var(--muted);}
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .cw{position:relative;width:100%;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:right;padding:8px 6px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  th{color:var(--muted);font-weight:500;}
  td.name{display:flex;align-items:center;gap:8px;}
  footer{margin-top:24px;font-size:12px;color:var(--muted);text-align:center;}
  @media(max-width:760px){.grid2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><div class="logo">B</div>
      <div><h1>Bemori · Dashboard Marketing</h1><div class="sub" id="sub">Đang tải…</div></div>
    </div>
  </header>

  <div class="controls">
    <div class="seg" id="segPeriod">
      <span class="lbl">Kỳ</span>
      <button data-p="today">Hôm nay</button>
      <button data-p="7">7 ngày</button>
      <button data-p="30" class="on">30 ngày</button>
      <button data-p="month">Tháng này</button>
      <button data-p="90">90 ngày</button>
    </div>
    <div class="seg" id="segGran">
      <span class="lbl">Gộp</span>
      <button data-g="day" class="on">Ngày</button>
      <button data-g="week">Tuần</button>
      <button data-g="month">Tháng</button>
    </div>
  </div>

  <div class="kpis" id="mkpis"></div>

  <div class="grid2">
    <div class="panel">
      <h2>Hiệu quả theo kênh marketing</h2>
      <table id="chTable"><thead><tr><th>Kênh</th><th>Đơn</th><th>Doanh thu</th><th>AOV</th><th>%</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="panel">
      <h2>Cơ cấu theo kênh</h2>
      <div class="legend" id="legCh"></div>
      <div class="cw" style="height:230px;"><canvas id="cMix"></canvas></div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:16px;">
    <h2><span>Xu hướng doanh thu online theo kênh</span><span id="granLabel" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
    <div class="legend" id="legTrend"></div>
    <div class="cw" style="height:300px;"><canvas id="cTrend"></canvas></div>
  </div>

  <div class="secTitle">Bối cảnh doanh số toàn hệ thống</div>
  <div class="kpis" id="skpis"></div>
  <div class="grid2">
    <div class="panel">
      <h2>Online vs Cửa hàng vs Sỉ</h2>
      <div class="legend" id="legType"></div>
      <div class="cw" style="height:210px;"><canvas id="cType"></canvas></div>
    </div>
    <div class="panel">
      <h2>Theo cửa hàng</h2>
      <div class="cw" id="storeWrap" style="height:420px;"><canvas id="cStore"></canvas></div>
    </div>
  </div>

  <footer id="foot"></footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<script>
(function(){
  var D=window.DASHBOARD_DATA; if(!D||!D.daily){document.getElementById('sub').textContent='Không tìm thấy data.js';return;}
  var PALETTE={'Facebook':'#378ADD','Zalo cá nhân':'#1D9E75','Admin':'#888780','Shopee':'#D85A30','Instagram':'#D4537E','Zalo OA':'#BA7517','Website':'#7F77DD','Tiktok Shop':'#26215C','Khác':'#7F77DD'};
  var FB=['#378ADD','#1D9E75','#D85A30','#D4537E','#BA7517','#7F77DD','#888780'];
  var colorOf=function(n,i){return PALETTE[n]||FB[i%FB.length];};
  function vnd(n){n=Math.round(n); if(n>=1e9)return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+' tỷ'; if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' tr'; if(n>=1e3)return Math.round(n/1e3)+'K'; return String(n);}
  var full=function(n){return Math.round(n).toLocaleString('vi-VN')+'đ';};
  Chart.defaults.color='#6b7280'; Chart.defaults.font.family='inherit'; var grid='rgba(0,0,0,0.06)';

  var period='30', gran='day';
  var charts={};

  function sliceFor(p){
    var d=D.daily; if(!d.length) return [];
    if(p==='today') return d.slice(-1);
    if(p==='7') return d.slice(-7);
    if(p==='30') return d.slice(-30);
    if(p==='90') return d.slice(-90);
    if(p==='month'){ var m=d[d.length-1].day.slice(0,7); return d.filter(function(x){return x.day.slice(0,7)===m;}); }
    return d;
  }
  function aggregate(slice){
    var ch={}, type={}, store={}, onlineRev=0, onlineOrders=0, totalRev=0, salesCount=0;
    slice.forEach(function(d){
      for(var k in d.channel){ ch[k]=ch[k]||{rev:0,orders:0}; ch[k].rev+=d.channel[k].rev; ch[k].orders+=d.channel[k].orders; }
      for(var t in d.type) type[t]=(type[t]||0)+d.type[t];
      for(var s in d.store) store[s]=(store[s]||0)+d.store[s];
      onlineRev+=d.mktRev; onlineOrders+=d.mktOrders; totalRev+=d.salesRev; salesCount+=d.salesCount;
    });
    var channels=Object.keys(ch).sort(function(a,b){return ch[b].rev-ch[a].rev;})
      .map(function(n){return {name:n,orders:ch[n].orders,revenue:ch[n].rev,aov:ch[n].orders?Math.round(ch[n].rev/ch[n].orders):0,share:onlineRev?Math.round(ch[n].rev/onlineRev*100):0};});
    var stores=Object.keys(store).sort(function(a,b){return store[b]-store[a];}).map(function(n){return {name:n,rev:store[n]};});
    return {channels:channels,type:type,stores:stores,onlineRev:onlineRev,onlineOrders:onlineOrders,
      onlineAov:onlineOrders?Math.round(onlineRev/onlineOrders):0,totalRev:totalRev,salesCount:salesCount,
      onlinePct:totalRev?Math.round((type['Online']||0)/totalRev*100):0,storePct:totalRev?Math.round((type['Cửa hàng']||0)/totalRev*100):0};
  }
  function bucketKey(day,g){
    if(g==='month') return day.slice(0,7);
    if(g==='week'){ var d=new Date(day+'T00:00:00Z'); var dow=(d.getUTCDay()+6)%7; d.setUTCDate(d.getUTCDate()-dow); return d.toISOString().slice(0,10); }
    return day;
  }
  function buildTrend(slice,g){
    var top=aggregate(slice).channels.slice(0,5).map(function(c){return c.name;});
    var buckets=[], idx={};
    slice.forEach(function(d){ var k=bucketKey(d.day,g); if(idx[k]===undefined){idx[k]=buckets.length;buckets.push({key:k,ch:{}});}
      var b=buckets[idx[k]]; for(var c in d.channel){ var name=top.indexOf(c)>=0?c:'Khác'; b.ch[name]=(b.ch[name]||0)+d.channel[c].rev; } });
    var series=top.concat(['Khác']).map(function(name,i){return {name:name,color:colorOf(name,i),data:buckets.map(function(b){return Math.round(b.ch[name]||0);})};})
      .filter(function(s){return s.data.some(function(v){return v>0;});});
    return {labels:buckets.map(function(b){return g==='month'?b.key:b.key.slice(5);}),series:series};
  }

  function render(){
    var A=aggregate(sliceFor(period));
    document.getElementById('mkpis').innerHTML=[
      {label:'Doanh thu online',val:vnd(A.onlineRev),accent:true},
      {label:'Đơn online',val:A.onlineOrders.toLocaleString('vi-VN')},
      {label:'AOV online',val:vnd(A.onlineAov)},
      {label:'Số kênh',val:A.channels.length},
    ].map(function(k){return '<div class="kpi'+(k.accent?' accent':'')+'"><div class="label">'+k.label+'</div><div class="val">'+k.val+'</div></div>';}).join('');

    document.querySelector('#chTable tbody').innerHTML=A.channels.map(function(c,i){
      return '<tr><td class="name"><span class="dot" style="background:'+colorOf(c.name,i)+'"></span>'+c.name+'</td><td>'+c.orders+'</td><td>'+vnd(c.revenue)+'</td><td>'+vnd(c.aov)+'</td><td>'+c.share+'%</td></tr>';}).join('')||'<tr><td colspan="5" style="color:var(--muted)">Không có đơn online trong kỳ</td></tr>';

    document.getElementById('legCh').innerHTML=A.channels.map(function(c,i){return '<span><span class="dot" style="background:'+colorOf(c.name,i)+'"></span>'+c.name+' '+c.share+'%</span>';}).join('');
    drawDonut('cMix',A.channels.map(function(c){return c.name;}),A.channels.map(function(c){return c.revenue;}),A.channels.map(function(c,i){return colorOf(c.name,i);}));

    var T=buildTrend(sliceFor(period),gran);
    document.getElementById('granLabel').textContent='(theo '+(gran==='day'?'ngày':gran==='week'?'tuần':'tháng')+')';
    document.getElementById('legTrend').innerHTML=T.series.map(function(s){return '<span><span class="dot" style="background:'+s.color+'"></span>'+s.name+'</span>';}).join('');
    drawTrend('cTrend',T);

    document.getElementById('skpis').innerHTML=[
      {label:'Tổng doanh thu',val:vnd(A.totalRev)},
      {label:'Cửa hàng',val:A.storePct+'%'},
      {label:'Online',val:A.onlinePct+'%'},
      {label:'Số hóa đơn',val:A.salesCount.toLocaleString('vi-VN')},
    ].map(function(k){return '<div class="kpi"><div class="label">'+k.label+'</div><div class="val">'+k.val+'</div></div>';}).join('');

    var tl=Object.keys(A.type),tcol={'Cửa hàng':'#1D9E75','Online':'#378ADD','Sỉ':'#BA7517'};
    document.getElementById('legType').innerHTML=tl.map(function(k){return '<span><span class="dot" style="background:'+(tcol[k]||'#888')+'"></span>'+k+' '+vnd(A.type[k])+'</span>';}).join('');
    drawDonut('cType',tl,tl.map(function(k){return A.type[k];}),tl.map(function(k){return tcol[k]||'#888';}));

    document.getElementById('storeWrap').style.height=(Math.max(A.stores.length,1)*34+70)+'px';
    drawBar('cStore',A.stores.map(function(s){return s.name;}),A.stores.map(function(s){return s.rev;}),'#1D9E75');
  }

  function drawDonut(id,labels,vals,colors){ if(charts[id])charts[id].destroy();
    charts[id]=new Chart(document.getElementById(id),{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+': '+full(c.parsed);}}}}}}); }
  function drawBar(id,labels,vals,color){ if(charts[id])charts[id].destroy();
    charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{data:vals,backgroundColor:color,borderRadius:4,barThickness:20}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return full(c.parsed.x);}}}},scales:{x:{grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}},y:{grid:{display:false}}}}}); }
  function drawTrend(id,T){ if(charts[id])charts[id].destroy();
    charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:T.labels,datasets:T.series.map(function(s){return {label:s.name,data:s.data,backgroundColor:s.color,stack:'x',borderRadius:2};})},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+full(c.parsed.y);}}}},
        scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:grid},ticks:{callback:function(v){return vnd(v);}}}}}}); }

  function bindSeg(elId,attr,setter){ document.getElementById(elId).addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;
    this.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); setter(b.getAttribute(attr)); render(); }); }
  bindSeg('segPeriod','data-p',function(v){period=v;});
  bindSeg('segGran','data-g',function(v){gran=v;});

  document.getElementById('sub').textContent='Nguồn: nhanh.vn · dữ liệu '+D.daily.length+' ngày';
  document.getElementById('foot').textContent='Cập nhật '+new Date(D.generatedAt).toLocaleString('vi-VN')+' · '+D.period.fromDate+' → '+D.period.toDate;
  render();
})();
</script>
</body>
</html>
